  <style>
/* sunget-login.css - نفس الستايل الداكن الاحترافي 🔥 */
:root {
  --bg: #0b0b0f;
  --bg-2: #14141c;
  --surface: #1a1a24;
  --surface-2: #20202c;
  --text: #ffffff;
  --text-muted: #b8b8c4;
  --border: rgba(255, 255, 255, 0.08);
  --accent: #ffb400;
  --accent-2: #ff7a00;
  --danger: #e63946;
  --success: #27b82e;
  --shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
  --shadow-lg: 0 35px 60px -15px rgba(0, 0, 0, 0.5);
  --radius: 20px;
  --gradient: linear-gradient(135deg, var(--accent), var(--accent-2));
  --gradient-hover: linear-gradient(135deg, var(--accent-2), var(--accent));
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: 
    radial-gradient(circle at 10% 30%, rgba(255, 180, 0, 0.12) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255, 122, 0, 0.08) 0%, transparent 40%),
    radial-gradient(circle at 40% 10%, rgba(255, 180, 0, 0.06) 0%, transparent 40%);
  z-index: -1;
  animation: backgroundFloat 30s ease-in-out infinite;
}

@keyframes backgroundFloat {
  0%, 100% { transform: scale(1) translateY(0px); }
  33% { transform: scale(1.05) translateY(-20px); }
  66% { transform: scale(1.02) translateY(-10px); }
}

/* Main Card */
.card {
  background: rgba(26, 26, 36, 0.95);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 60px 50px;
  width: 100%;
  max-width: 480px;
  box-shadow: var(--shadow-lg);
  position: relative;
  overflow: hidden;
  animation: cardSlideIn 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

@keyframes cardSlideIn {
  from {
    opacity: 0;
    transform: translateY(50px) scale(0.95);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 6px;
  background: var(--gradient);
  border-radius: var(--radius) var(--radius) 0 0;
}

/* Logo Section */
.logo {
  text-align: center;
  margin-bottom: 40px;
  position: relative;
}

.logo-img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  object-fit: cover;
  border: 4px solid rgba(255, 255, 255, 0.15);
  margin: 0 auto 24px;
  box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.logo-img:hover {
  transform: scale(1.08) rotate(5deg);
  border-color: rgba(255, 180, 0, 0.4);
  box-shadow: 0 20px 45px rgba(255, 180, 0, 0.3);
}

.logo h3 {
  font-size: clamp(2rem, 5vw, 2.8rem);
  font-weight: 800;
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.8px;
  margin-bottom: 8px;
}

.logo h3:nth-of-type(2) {
  font-size: clamp(1.6rem, 3vw, 2.2rem);
  font-weight: 700;
  color: var(--text);
  background: none;
  -webkit-text-fill-color: var(--text);
  margin-top: 4px;
  opacity: 0.9;
}

/* Form */
#login-form {
  display: flex;
  flex-direction: column;
  gap: 28px;
}

#login-form input {
  width: 100%;
  padding: 24px 28px;
  border: 2px solid var(--border);
  border-radius: 16px;
  font-size: 1.1rem;
  font-family: inherit;
  background: var(--surface);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  color: var(--text);
  font-weight: 500;
}

#login-form input::placeholder {
  color: var(--text-muted);
  font-weight: 400;
}

#login-form input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 
    0 0 0 4px rgba(255, 180, 0, 0.15),
    0 20px 40px rgba(0, 0, 0, 0.3);
  transform: translateY(-3px);
  background: var(--surface-2);
}

/* Password Wrapper */
.pass-wrapper {
  position: relative;
  width: 100%;
}

.pass-wrapper input {
  padding-right: 60px;
}

.pass-wrapper button {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: transparent;
  border: none;
  color: var(--text-muted);
  font-size: 18px;
  cursor: pointer;
  padding: 4px;
  border-radius: 6px;
  transition: all 0.3s ease;
}

.pass-wrapper button:hover {
  color: var(--accent);
  background: rgba(255, 180, 0, 0.1);
}

/* Submit Button */
#login-form button[type="submit"] {
  padding: 24px 36px;
  border: none;
  border-radius: 50px;
  font-size: 1.2rem;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  text-decoration: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  font-family: inherit;
  position: relative;
  overflow: hidden;
  background: var(--gradient);
  color: #000;
  text-transform: uppercase;
  letter-spacing: 1px;
  box-shadow: var(--shadow);
  margin-top: 12px;
}

#login-form button[type="submit"]::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
  transition: left 0.7s;
}

#login-form button[type="submit"]:hover::before {
  left: 100%;
}

#login-form button[type="submit"]:hover {
  transform: translateY(-8px) scale(1.03);
  box-shadow: 0 40px 60px -15px rgba(255, 180, 0, 0.45);
}

#login-form button[type="submit"]:active {
  transform: translateY(-4px) scale(1.02);
}

/* Social Login Buttons */
.social-login {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 20px;
}

.social-login button {
  padding: 16px 24px;
  border: 2px solid var(--border);
  border-radius: 16px;
  background: var(--surface);
  color: var(--text);
  font-family: inherit;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  position: relative;
  overflow: hidden;
}

.social-login button::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  transition: left 0.6s;
}

.social-login button:hover::before {
  left: 100%;
}

.social-login button:hover {
  border-color: var(--accent);
  background: rgba(255, 180, 0, 0.08);
  transform: translateY(-2px);
  box-shadow: 0 15px 30px rgba(255, 180, 0, 0.2);
}

#googleLogin::before {
  content: "🔴";
  margin-right: 8px;
}

#facebookLogin::before {
  content: "📘";
  margin-right: 8px;
}

/* Links Section */
.links-section {
  margin-top: 32px;
  padding-top: 28px;
  border-top: 1px solid var(--border);
  text-align: center;
}

.links-section .link {
  color: var(--text-muted);
  text-decoration: none;
  font-weight: 600;
  font-size: 0.95rem;
  transition: all 0.3s ease;
  display: inline-block;
  margin: 0 8px;
  position: relative;
}

.links-section .link::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: 50%;
  width: 0;
  height: 2px;
  background: var(--accent);
  transition: all 0.3s ease;
  transform: translateX(-50%);
}

.links-section .link:hover {
  color: var(--accent);
}

.links-section .link:hover::after {
  width: 100%;
}

/* Messages */
#msg {
  margin-top: 30px;
  min-height: 24px;
}

.success, .error {
  padding: 20px 28px;
  border-radius: 16px;
  font-weight: 600;
  font-size: 1rem;
  animation: msgSlideIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  backdrop-filter: blur(15px);
  border: 1px solid transparent;
  text-align: center;
  box-shadow: var(--shadow);
}

.success {
  background: rgba(39, 184, 46, 0.18);
  color: var(--success);
  border-color: rgba(39, 184, 46, 0.35);
}

.error {
  background: rgba(230, 57, 70, 0.18);
  color: var(--danger);
  border-color: rgba(230, 57, 70, 0.35);
}

@keyframes msgSlideIn {
  from {
    opacity: 0;
    transform: translateY(-20px) scale(0.95);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

/* Loading State */
#login-form button[type="submit"].loading {
  pointer-events: none;
  position: relative;
  color: #000;
}

#login-form button[type="submit"].loading::after {
  content: '';
  position: absolute;
  width: 28px;
  height: 28px;
  margin: auto;
  border: 3px solid transparent;
  border-top-color: #000;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Pulse Glow Animation */
#login-form button[type="submit"] {
  animation: buttonPulse 3s ease-in-out infinite alternate;
}

@keyframes buttonPulse {
  from {
    box-shadow: var(--shadow);
  }
  to {
    box-shadow: 0 0 50px rgba(255, 180, 0, 0.6);
  }
}

  <body>
    <div class="card">
      <div class="logo">
        <h3 data-i18n="brand_name">SUNGET.COM</h3>
        <h3 data-i18n="title">تسجيل دخول</h3>
      </div>

      <form id="login-form">
        <input
          id="email"
          type="email"
          data-i18n-placeholder="email"
          placeholder="البريد الإلكتروني"
          required
        />
        <div class="pass-wrapper">
          <input
            id="password"
            type="password"
            data-i18n-placeholder="password"
            placeholder="كلمة المرور"
            required
          />
          <button type="button" id="togglePass">👁</button>
        </div>
        <button type="submit" data-i18n="login">تسجيل الدخول</button>
      </form>

      <div id="msg"></div>

     
<!-- Social Login -->

<div class="social-login">

  <p> 

    ⚠️ تسجيل الدخول بجوجل   متاح للعملاء فقط، وليس لأصحاب الفنادق

  </p>

  <button id="googleLogin" data-i18n="google_login">تسجيل دخول بجوجل</button>



</div>


      <!-- Links Section -->
      <div class="links-section">
        <a href="signup.html" class="link" data-i18n="have_account">ليس لديك حساب؟ إنشاء حساب جديد</a>
        <a href="forgot_password.html" class="link" data-i18n="forgot_password">نسيت كلمة المرور؟</a>
      </div>
    </div>

    <!-- تحميل مكتبة Supabase مرة واحدة -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/i18next@23.10.1/dist/umd/i18next.min.js"></script>

    <script>
      // 1️⃣ إنشاء عميل Supabase
      const SUPABASE_URL = "https://mqvmxqzwvpasdytbpbke.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xdm14cXp3dnBhc2R5dGJwYmtlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjIyODMwMjksImV4cCI6MjA3Nzg1OTAyOX0.jHrxC0IcuWYkSaB2y-guc5tl5dPPWFSoasv3rmjcxuM";

      const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      // 2️⃣ دالة لإظهار الرسائل
      function show(el, text, type = "error") {
        if (!el) return;
        el.innerHTML = `<div class="${type}">${text}</div>`;
      }

      // 3️⃣ التعامل مع نموذج تسجيل الدخول
      const loginForm = document.getElementById("login-form");
      if (loginForm) {
        loginForm.addEventListener("submit", async (e) => {
          e.preventDefault();

          const emailEl = document.getElementById("email");
          const passwordEl = document.getElementById("password");
          const submitBtn = loginForm.querySelector('button[type="submit"]');
          const msgEl = document.getElementById("msg");

          if (!emailEl || !passwordEl || !msgEl) return;

          const email = emailEl.value.trim();
          const password = passwordEl.value;

          if (!email || !password) {
            show(msgEl, "❌ يرجى إدخال البريد الإلكتروني وكلمة المرور");
            return;
          }

          submitBtn.classList.add("loading");
          submitBtn.textContent = i18next.t("msg_loading") || "جارٍ تسجيل الدخول...";

          try {
            const { data, error } = await sb.auth.signInWithPassword({ email, password });

            if (error) {
              show(msgEl, i18next.t("msg_wrong") || "❌ البريد الإلكتروني أو كلمة المرور غير صحيحة");
              return;
            }

            if (!data.user) {
              show(msgEl, i18next.t("msg_no_account") || "❌ حدث خطأ: المستخدم غير موجود");
              return;
            }

            console.log("User:", data.user);
            console.log("Metadata:", data.user.user_metadata);

            const role = data.user.user_metadata?.role;

            if (role === "user") {
              show(msgEl, i18next.t("msg_user_success") || "✅ تم تسجيل الدخول كمستخدم", "success");
              setTimeout(() => {
                window.location.href = "index.html";
              }, 1500);
              return;
            }

            if (role === "provider") {
              show(msgEl, i18next.t("msg_provider_success") || "✅ تم تسجيل الدخول كمزود خدمة", "success");
              setTimeout(() => {
                window.location.href = "تسجيل الفندق.html";
              }, 1500);
              return;
            }

            show(msgEl, "❌ نوع الحساب غير محدد");

          } catch (err) {
            console.error("Login Error:", err);
            show(msgEl, i18next.t("msg_error") || "❌ حدث خطأ غير متوقع");
          } finally {
            submitBtn.classList.remove("loading");
            submitBtn.textContent = i18next.t("login") || "تسجيل الدخول";
          }
        });
      }

      // Google & Facebook Login
      document.getElementById("googleLogin").onclick = async () => {
        await sb.auth.signInWithOAuth({
          provider: "google",
          options: {
            redirectTo: window.location.origin + "/index.html"
          }
        });
      };

      document.getElementById("facebookLogin").onclick = async () => {
        await sb.auth.signInWithOAuth({
          provider: "facebook",
          options: {
            redirectTo: window.location.origin + "/index.html"
          }
        });
      };

      // Password Toggle
      const toggleBtn = document.getElementById("togglePass");
      const passwordInput = document.getElementById("password");

      if (toggleBtn && passwordInput) {
        toggleBtn.addEventListener("click", () => {
          const isHidden = passwordInput.type === "password";
          passwordInput.type = isHidden ? "text" : "password";
          toggleBtn.textContent = isHidden ? "🙈" : "👁";
        });
      }
    </script>

    <script>
      const resources = {
        ar: {
