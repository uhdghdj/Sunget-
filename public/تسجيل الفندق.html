<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sunget — لوحة تحكم الفندق</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link rel="manifest" href="/manifest.json">

<meta name="theme-color" content="#d4af37">

<meta name="mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-capable" content="yes">

<link rel="apple-touch-icon" href="/icons/icon-192.png">
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      defer
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      /* ============================================================
   SUNGET — Ultra Premium Dark CSS
   Theme: Cyberpunk Luxury · Neon Amber · Glassmorphism
   ============================================================ */

      @import url("https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap");

      /* ── CUSTOM PROPERTIES ─────────────────────────────────────── */
      :root {
        --bg: #07070d;
        --bg2: #0d0d18;
        --surface: rgba(255, 255, 255, 0.04);
        --surface2: rgba(255, 255, 255, 0.07);
        --glass: rgba(255, 255, 255, 0.05);
        --glass-b: rgba(255, 255, 255, 0.1);
        --text: #f0f0ff;
        --muted: #8888aa;
        --border: rgba(255, 180, 0, 0.12);
        --border-dim: rgba(255, 255, 255, 0.06);

        --accent: #ffb400;
        --accent2: #ff6a00;
        --accent3: #ffe066;
        --glow: rgba(255, 180, 0, 0.35);
        --glow-soft: rgba(255, 180, 0, 0.12);

        --danger: #ff3b5c;
        --success: #00e57a;
        --info: #3b82f6;

        --radius: 16px;
        --radius-sm: 10px;
        --sidebar-w: 260px;
        --header-h: 68px;

        --shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 4px 16px rgba(0, 0, 0, 0.4);
        --shadow-glow: 0 0 40px var(--glow), 0 20px 60px rgba(0, 0, 0, 0.5);
        --shadow-card:
          0 8px 32px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }

      [data-theme="light"] {
        --bg: #f0f0f8;
        --bg2: #ffffff;
        --surface: rgba(0, 0, 0, 0.03);
        --surface2: rgba(0, 0, 0, 0.05);
        --glass: rgba(255, 255, 255, 0.7);
        --glass-b: rgba(255, 255, 255, 0.9);
        --text: #1a1a2e;
        --muted: #6666888;
        --border: rgba(255, 140, 0, 0.2);
        --border-dim: rgba(0, 0, 0, 0.08);
        --shadow:
          0 20px 60px rgba(0, 0, 0, 0.12), 0 4px 16px rgba(0, 0, 0, 0.06);
        --shadow-glow:
          0 0 40px rgba(255, 180, 0, 0.2), 0 20px 60px rgba(0, 0, 0, 0.1);
        --shadow-card:
          0 8px 32px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.8);
      }

      /* ── RESET & BASE ───────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        font-family: "Cairo", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      /* Ambient background glow */
      body::before {
        content: "";
        position: fixed;
        top: -30vh;
        right: -20vw;
        width: 70vw;
        height: 70vh;
        background: radial-gradient(
          ellipse,
          rgba(255, 140, 0, 0.06) 0%,
          transparent 70%
        );
        pointer-events: none;
        z-index: 0;
      }
      body::after {
        content: "";
        position: fixed;
        bottom: -20vh;
        left: -10vw;
        width: 50vw;
        height: 50vh;
        background: radial-gradient(
          ellipse,
          rgba(59, 130, 246, 0.04) 0%,
          transparent 70%
        );
        pointer-events: none;
        z-index: 0;
      }

      /* ── LAYOUT ─────────────────────────────────────────────────── */
      .app {
        display: grid;
        grid-template-columns: var(--sidebar-w) 1fr;
        grid-template-rows: var(--header-h) 1fr;
        min-height: 100vh;
        position: relative;
        z-index: 1;
      }

      /* ── HEADER ─────────────────────────────────────────────────── */
      header {
        grid-column: 1/-1;
        background: rgba(13, 13, 24, 0.85);
        backdrop-filter: blur(24px) saturate(1.8);
        -webkit-backdrop-filter: blur(24px) saturate(1.8);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        position: sticky;
        top: 0;
        z-index: 100;
        gap: 12px;
        box-shadow:
          0 1px 0 rgba(255, 180, 0, 0.08),
          0 4px 24px rgba(0, 0, 0, 0.4);
      }

      /* Glowing bottom line on header */
      header::after {
        content: "";
        position: absolute;
        bottom: -1px;
        left: 10%;
        right: 10%;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--accent),
          transparent
        );
        opacity: 0.4;
      }

      /* ── LOGO ───────────────────────────────────────────────────── */
      .logo {
        font-weight: 900;
        font-size: 24px;
        letter-spacing: 3px;
        background: linear-gradient(
          135deg,
          var(--accent3) 0%,
          var(--accent) 50%,
          var(--accent2) 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        filter: drop-shadow(0 0 12px rgba(255, 180, 0, 0.5));
        position: relative;
      }

      /* ── ICON BUTTONS ───────────────────────────────────────────── */
      .icon-btn {
        background: var(--surface2);
        border: 1px solid var(--border-dim);
        color: var(--text);
        width: 44px;
        height: 44px;
        border-radius: 50%;
        cursor: pointer;
        position: relative;
        font-size: 18px;
        display: grid;
        place-items: center;
        flex-shrink: 0;
        transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        backdrop-filter: blur(8px);
      }

      .icon-btn:hover {
        background: var(--glow-soft);
        border-color: var(--accent);
        box-shadow:
          0 0 20px var(--glow),
          0 0 0 4px rgba(255, 180, 0, 0.08);
        transform: translateY(-2px) scale(1.08);
      }
      .icon-btn:active {
        transform: scale(0.96);
      }

      .menu {
        display: flex;
        gap: 8px;
        align-items: center;
        overflow-x: auto;
      }

      .badge {
        position: absolute;
        top: -5px;
        left: -5px;
        background: var(--danger);
        color: #fff;
        min-width: 20px;
        height: 20px;
        border-radius: 10px;
        font-size: 10px;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 0 5px;
        font-weight: 800;
        box-shadow: 0 0 12px rgba(255, 59, 92, 0.6);
        border: 2px solid var(--bg2);
        animation: pulse-badge 2s ease-in-out infinite;
      }
      .badge.show {
        display: flex;
      }

      @keyframes pulse-badge {
        0%,
        100% {
          box-shadow: 0 0 12px rgba(255, 59, 92, 0.6);
        }
        50% {
          box-shadow: 0 0 20px rgba(255, 59, 92, 0.9);
        }
      }

      #menuToggle {
        display: none;
        background: none;
        border: none;
        color: var(--text);
        font-size: 24px;
        cursor: pointer;
        padding: 6px;
        border-radius: 8px;
        transition: color 0.2s;
      }
      #menuToggle:hover {
        color: var(--accent);
      }

      /* ── SIDEBAR ─────────────────────────────────────────────────── */
      aside {
        background: rgba(13, 13, 24, 0.9);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-left: 1px solid var(--border);
        padding: 20px 12px;
        overflow-y: auto;
        overflow-x: hidden;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }

      aside::-webkit-scrollbar {
        width: 4px;
      }
      aside::-webkit-scrollbar-track {
        background: transparent;
      }
      aside::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
      }

      aside a {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        border-radius: var(--radius-sm);
        color: var(--muted);
        text-decoration: none;
        margin-bottom: 3px;
        font-weight: 600;
        font-size: 13.5px;
        transition: all 0.22s ease;
        position: relative;
        overflow: hidden;
        border: 1px solid transparent;
      }

      aside a::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          transparent,
          rgba(255, 180, 0, 0.05)
        );
        opacity: 0;
        transition: opacity 0.3s;
      }

      aside a:hover {
        background: rgba(255, 180, 0, 0.06);
        color: var(--text);
        border-color: var(--border);
        transform: translateX(-3px);
      }
      aside a:hover::before {
        opacity: 1;
      }

      aside a.active {
        background: linear-gradient(
          135deg,
          rgba(255, 180, 0, 0.15),
          rgba(255, 106, 0, 0.1)
        );
        color: var(--accent);
        border-color: rgba(255, 180, 0, 0.3);
        box-shadow:
          inset 0 0 24px rgba(255, 180, 0, 0.06),
          0 0 0 1px rgba(255, 180, 0, 0.1);
      }

      /* Active left bar */
      aside a.active::after {
        content: "";
        position: absolute;
        left: 0;
        top: 20%;
        bottom: 20%;
        width: 3px;
        border-radius: 0 3px 3px 0;
        background: linear-gradient(180deg, var(--accent3), var(--accent2));
        box-shadow: 0 0 10px var(--glow);
      }

      /* ── MAIN ───────────────────────────────────────────────────── */
      main {
        padding: 28px;
        overflow-y: auto;
        background: transparent;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }
      main::-webkit-scrollbar {
        width: 6px;
      }
      main::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 6px;
      }

      h2 {
        margin: 0 0 20px;
        font-size: 24px;
        font-weight: 800;
        background: linear-gradient(135deg, var(--text), var(--muted));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      h3 {
        margin: 0 0 14px;
        font-size: 15px;
        font-weight: 700;
        color: var(--accent);
        letter-spacing: 0.3px;
        text-transform: uppercase;
        font-size: 12px;
      }

      /* ── CARD ───────────────────────────────────────────────────── */
      .card {
        background: var(--glass);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--border-dim);
        border-radius: var(--radius);
        padding: 22px;
        margin-bottom: 16px;
        box-shadow: var(--shadow-card);
        transition:
          border-color 0.3s,
          box-shadow 0.3s,
          transform 0.3s;
        position: relative;
        overflow: hidden;
      }

      .card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.1),
          transparent
        );
        pointer-events: none;
      }

      .card:hover {
        border-color: rgba(255, 180, 0, 0.18);
        box-shadow:
          var(--shadow-card),
          0 0 30px rgba(255, 180, 0, 0.04);
        transform: translateY(-1px);
      }

      /* ── GRID ───────────────────────────────────────────────────── */
      .grid {
        display: grid;
        gap: 14px;
      }
      .grid.cols-2 {
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }
      .grid.cols-3 {
        grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      }
      .grid.cols-4 {
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      }

      /* ── STAT CARDS ─────────────────────────────────────────────── */
      .stat {
        background: var(--glass);
        backdrop-filter: blur(12px);
        padding: 22px 20px;
        border-radius: var(--radius);
        border: 1px solid var(--border-dim);
        box-shadow: var(--shadow-card);
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        position: relative;
        overflow: hidden;
      }

      .stat::after {
        content: "";
        position: absolute;
        bottom: -30px;
        left: -30px;
        width: 100px;
        height: 100px;
        background: radial-gradient(
          circle,
          rgba(255, 180, 0, 0.08),
          transparent 70%
        );
        pointer-events: none;
        transition: transform 0.4s;
      }

      .stat:hover {
        border-color: rgba(255, 180, 0, 0.3);
        box-shadow: var(--shadow-glow);
        transform: translateY(-4px) scale(1.01);
      }
      .stat:hover::after {
        transform: scale(1.5);
      }

      .stat .v {
        font-size: 32px;
        font-weight: 900;
        background: linear-gradient(
          135deg,
          var(--accent3),
          var(--accent),
          var(--accent2)
        );
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        filter: drop-shadow(0 0 8px rgba(255, 180, 0, 0.4));
        line-height: 1.1;
      }

      .stat .l {
        color: var(--muted);
        font-size: 13px;
        margin-top: 6px;
        font-weight: 600;
        letter-spacing: 0.5px;
      }

      /* ── INPUTS / SELECT / TEXTAREA ────────────────────────────── */
      input,
      select,
      textarea {
        width: 100%;
        padding: 12px 16px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border-dim);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        font-family: "Cairo", sans-serif;
        font-size: 14px;
        margin-bottom: 10px;
        transition: all 0.25s ease;
        backdrop-filter: blur(8px);
      }

      input::placeholder,
      textarea::placeholder {
        color: var(--muted);
      }

      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: var(--accent);
        background: rgba(255, 180, 0, 0.04);
        box-shadow:
          0 0 0 3px rgba(255, 180, 0, 0.1),
          0 0 20px rgba(255, 180, 0, 0.08);
      }

      select option {
        background: #1a1a2e;
        color: var(--text);
      }

      label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 6px;
        font-weight: 700;
        letter-spacing: 0.8px;
        text-transform: uppercase;
      }

      /* ── BUTTONS ────────────────────────────────────────────────── */
      .btn {
        background: linear-gradient(
          135deg,
          var(--accent3) 0%,
          var(--accent) 50%,
          var(--accent2) 100%
        );
        background-size: 200% 100%;
        background-position: 100% 0;
        color: #0d0d00;
        border: none;
        border-radius: var(--radius-sm);
        padding: 12px 24px;
        font-weight: 800;
        cursor: pointer;
        font-family: "Cairo", sans-serif;
        font-size: 14px;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        box-shadow:
          0 6px 24px rgba(255, 138, 0, 0.3),
          0 0 0 0 rgba(255, 180, 0, 0);
        position: relative;
        overflow: hidden;
        letter-spacing: 0.3px;
      }

      .btn::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.15),
          transparent
        );
        opacity: 0;
        transition: opacity 0.3s;
      }

      .btn:hover {
        background-position: 0 0;
        transform: translateY(-3px) scale(1.02);
        box-shadow:
          0 12px 36px rgba(255, 138, 0, 0.45),
          0 0 30px rgba(255, 180, 0, 0.2);
      }
      .btn:hover::before {
        opacity: 1;
      }
      .btn:active {
        transform: translateY(0) scale(0.98);
        box-shadow: 0 4px 16px rgba(255, 138, 0, 0.25);
      }

      .btn.ghost {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border-dim);
        box-shadow: none;
      }
      .btn.ghost:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: rgba(255, 180, 0, 0.06);
        box-shadow: 0 0 20px rgba(255, 180, 0, 0.1);
        transform: translateY(-2px);
      }

      .btn.danger {
        background: linear-gradient(135deg, #ff3b5c, #c41432);
        color: #fff;
        box-shadow: 0 6px 24px rgba(255, 59, 92, 0.3);
      }
      .btn.danger:hover {
        box-shadow:
          0 12px 36px rgba(255, 59, 92, 0.45),
          0 0 30px rgba(255, 59, 92, 0.2);
      }

      .btn.success {
        background: linear-gradient(135deg, #00e57a, #00b85e);
        color: #001a0a;
        box-shadow: 0 6px 24px rgba(0, 229, 122, 0.3);
      }
      .btn.success:hover {
        box-shadow: 0 12px 36px rgba(0, 229, 122, 0.45);
      }

      /* ── WIZARD STEPS ───────────────────────────────────────────── */
      .steps {
        display: flex;
        gap: 6px;
        margin-bottom: 24px;
        flex-wrap: wrap;
        padding: 4px;
      }

      .step-pill {
        padding: 9px 18px;
        border-radius: 30px;
        background: var(--surface2);
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        border: 1px solid var(--border-dim);
        transition: all 0.25s ease;
        letter-spacing: 0.3px;
      }
      .step-pill:hover {
        border-color: var(--accent);
        color: var(--text);
      }

      .step-pill.active {
        background: linear-gradient(
          135deg,
          var(--accent3),
          var(--accent),
          var(--accent2)
        );
        color: #0d0d00;
        border-color: transparent;
        box-shadow:
          0 4px 20px rgba(255, 180, 0, 0.4),
          0 0 0 2px rgba(255, 180, 0, 0.15);
      }

      .step-pill.done {
        background: rgba(0, 229, 122, 0.1);
        color: var(--success);
        border-color: rgba(0, 229, 122, 0.3);
      }

      .step-pane {
        display: none;
      }
      .step-pane.active {
        display: block;
        animation: fadeSlideIn 0.3s ease;
      }

      @keyframes fadeSlideIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .actions {
        display: flex;
        gap: 10px;
        justify-content: space-between;
        margin-top: 20px;
        flex-wrap: wrap;
      }

      /* ── AMENITIES GRID ─────────────────────────────────────────── */
      .amen-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
        gap: 8px;
      }

      .amen-grid label {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 14px;
        border: 1px solid var(--border-dim);
        border-radius: var(--radius-sm);
        background: var(--surface2);
        cursor: pointer;
        margin: 0;
        color: var(--text);
        font-size: 13px;
        font-weight: 600;
        text-transform: none;
        letter-spacing: 0;
        transition: all 0.2s ease;
      }
      .amen-grid label:hover {
        border-color: rgba(255, 180, 0, 0.3);
      }
      .amen-grid input {
        width: auto;
        margin: 0;
        background: none;
        padding: 0;
      }
      .amen-grid label:has(input:checked) {
        border-color: var(--accent);
        background: rgba(255, 180, 0, 0.08);
        box-shadow:
          inset 0 0 20px rgba(255, 180, 0, 0.04),
          0 0 12px rgba(255, 180, 0, 0.08);
        color: var(--accent);
      }

      /* ── HOTEL PHOTOS GRID ──────────────────────────────────────── */
      .hotel-photos {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 12px;
        margin-bottom: 24px;
      }
      .hotel-photos img {
        width: 100%;
        height: 160px;
        object-fit: cover;
        border-radius: var(--radius);
        border: 1px solid var(--border-dim);
        transition: transform 0.4s ease;
        display: block;
      }
      .hotel-photos img:hover {
        transform: scale(1.04);
      }

      /* ── EXISTING PHOTOS THUMBNAILS (edit mode) ─────────────────── */
      #existingPhotosBox {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 14px;
      }
      .photo-thumb {
        position: relative;
        display: inline-block;
      }
      .photo-thumb img {
        width: 110px;
        height: 110px;
        object-fit: cover;
        border-radius: 10px;
        border: 1px solid var(--border-dim);
        display: block;
      }
      .photo-thumb .del-thumb {
        position: absolute;
        top: 4px;
        left: 4px;
        background: var(--danger);
        color: #fff;
        border: none;
        border-radius: 50%;
        width: 24px;
        height: 24px;
        cursor: pointer;
        font-size: 14px;
        display: grid;
        place-items: center;
        box-shadow: 0 2px 8px rgba(255, 59, 92, 0.4);
        transition: transform 0.2s;
      }
      .photo-thumb .del-thumb:hover {
        transform: scale(1.2);
      }

      /* ── UPLOAD PREVIEW ─────────────────────────────────────────── */
      #photoUploadPreview {
        display: flex;

        top: 0;
        z-index: 1;

        transition: background 0.2s;

      tr:hover td {
        background: rgba(255, 180, 0, 0.03);

      tr:last-child td {

        gap: 5px;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.5px;
        text-transform: uppercase;

        content: "";
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: currentColor;
        flex-shrink: 0;

        background: rgba(245, 158, 11, 0.12);
        color: #f59e0b;
        box-shadow: 0 0 10px rgba(245, 158, 11, 0.1);

        background: rgba(59, 130, 246, 0.12);
        color: #60a5fa;
        box-shadow: 0 0 10px rgba(59, 130, 246, 0.1);

      .tag.completed {
        background: rgba(0, 229, 122, 0.12);
        color: #00e57a;
        box-shadow: 0 0 10px rgba(0, 229, 122, 0.1);

      .tag.cancelled {
        background: rgba(255, 59, 92, 0.12);
        color: #ff6b81;
        box-shadow: 0 0 10px rgba(255, 59, 92, 0.1);

        grid-template-columns: repeat(7, 1fr);
        gap: 5px;

        aspect-ratio: 1;
        background: rgba(255, 255, 255, 0.03);

        border-radius: 10px;

        flex-direction: column;
        justify-content: space-between;
        transition: all 0.2s ease;

        border-color: rgba(255, 180, 0, 0.3);

      .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        background: var(--glass-b);
        backdrop-filter: blur(20px);
        border: 1px solid var(--border-dim);

        border-radius: var(--radius-sm);
        box-shadow:
          var(--shadow),
          0 0 30px rgba(0, 0, 0, 0.3);

        transform: translateX(calc(100% + 30px));

        font-size: 14px;
        font-weight: 600;
        max-width: 320px;
        color: var(--text);

        transform: translateX(0);

        border-color: rgba(0, 229, 122, 0.4);
        box-shadow:
          var(--shadow),
          0 0 20px rgba(0, 229, 122, 0.1);

        border-color: rgba(255, 59, 92, 0.4);
        box-shadow:
          var(--shadow),
          0 0 20px rgba(255, 59, 92, 0.1);
      }

        border-radius: var(--radius);

        border: 1px solid var(--border-dim);
        box-shadow: var(--shadow-card);

      /* ── RESPONSIVE ─────────────────────────────────────────────── */
      @media (max-width: 900px) {
        .app {
          grid-template-columns: 1fr;

      /* ── MICRO ANIMATIONS ───────────────────────────────────────── */

        }

      }

            function bindPhotoUpload() {
              const input = document.getElementById("photoInput");
              const preview = document.getElementById("photoUploadPreview");
              if (!input) return;
              input.onchange = () => {
                preview.innerHTML = "";
                Array.from(input.files).forEach((file) => {
                  const reader = new FileReader();
                  reader.onload = (e) => {
                    const img = document.createElement("img");
                    img.src = e.target.result;
                    preview.appendChild(img);
                  };
                  reader.readAsDataURL(file);
                });
              };
              const btn = document.getElementById("uploadPhotosBtn");
              if (btn) btn.onclick = uploadStepPhotos;
            }

            async function uploadStepPhotos() {
              const input = document.getElementById("photoInput");
              const btn = document.getElementById("uploadPhotosBtn");
              if (!input || !input.files || input.files.length === 0)
                return toast("اختر صوراً أولاً", "error");
              if (!state.hotel)
                return toast("احفظ الفندق أولاً من الخطوة الأخيرة لرفع الصور", "error");
              btn.disabled = true;
              btn.textContent = "جارٍ الرفع...";
              try {
                const newUrls = [];
                for (let i = 0; i < input.files.length; i++) {
                  const file = input.files[i];
                  const ext = file.name.split(".").pop();
                  const path = `${state.hotel.id}/${Date.now()}_${i}.${ext}`;
                  const { error } = await sb.storage
                    .from("hotel-photos")
                    .upload(path, file);
                  if (error) throw error;
                  const { data } = sb.storage
                    .from("hotel-photos")
                    .getPublicUrl(path);
                  newUrls.push(data.publicUrl);
                }
                const finalUrls = [
                  ...(state.formData.photo_urls || []),
                  ...newUrls,
                ];
                const { error } = await sb
                  .from("hotels")
                  .update({ photo_urls: finalUrls })
                  .eq("id", state.hotel.id);
                if (error) throw error;
                state.formData.photo_urls = finalUrls;
                toast("✅ تم رفع الصور", "success");
                input.value = "";
                document.getElementById("photoUploadPreview").innerHTML = "";
                renderExistingPhotos();
              } catch (err) {
                toast("❌ " + err.message, "error");
              } finally {
                btn.disabled = false;
                btn.textContent = "📤 رفع الصور";
              }
            }

                      <div><label>مساحة الغرفة (م²)</label><input type="number" id="rf_size_sqm" value="${v('size_sqm')}" placeholder="مثال: 35" min="1"/></div>

                    <div id="photoDropZone" style="border:2px dashed var(--border-dim);border-radius:var(--radius);padding:32px;text-align:center;cursor:pointer;transition:border-color .2s;background:var(--surface)">
                      <div style="font-size:36px;margin-bottom:8px">📷</div>
                      <p style="color:var(--muted);font-size:14px;margin-bottom:8px">اسحب الصور هنا أو</p>
                      <button type="button" class="btn ghost" id="photoPickBtn" style="font-size:13px;pointer-events:all">اختر صوراً</button>
                      <input type="file" id="photoFileInput" accept="image/*" multiple style="display:none">
                      <p style="color:var(--muted);font-size:11px;margin-top:8px">يدعم اختيار متعدد · اسحب لإعادة الترتيب · ⭐ لتعيين صورة رئيسية</p>
                    </div>
                    <div id="newPhotosPreviews" style="display:flex;flex-wrap:wrap;gap:10px;margin-top:14px"></div>
                  `)}

                  ${accSection('bathroom','🚿','4. مرافق الحمام',checkGrid('bath_feat',BATHROOM_FEATURES,v('_bathroom_features',[])))}
                  ${accSection('amenities','✨','5. مرافق الغرفة',checkGrid('room_feat',ROOM_FEATURES,v('_features',[])))}

                  ${accSection('pricing','💰','6. الأسعار',`
                    <div class="grid cols-2">
                      <div><label>سعر الليلة *</label><input type="number" id="rf_price" value="${v('price')}" placeholder="0" min="0"/></div>
                      <div><label>العملة</label><select id="rf_currency">${CURRENCIES.map(c=>`<option value="${c}" ${v('currency','USD')===c?'selected':''}>${c}</option>`).join('')}</select></div>
                      <div><label>الضريبة (%)</label><input type="number" id="rf_tax_pct" value="${v('tax_pct',0)}" min="0" max="100"/></div>
                    </div>
                    <div style="display:flex;flex-direction:column;gap:10px;margin-top:12px">
                      ${[['rf_price_includes_tax','السعر يشمل الضرائب'],['rf_breakfast_included','يشمل الإفطار'],['rf_pay_at_arrival','الدفع عند الوصول'],['rf_refundable','قابل للإلغاء/الاسترداد']].map(([id,lbl])=>`
                        <label style="display:flex;align-items:center;gap:10px;padding:12px 14px;border:1px solid var(--border-dim);border-radius:10px;background:var(--surface2);cursor:pointer;text-transform:none;letter-spacing:0;font-size:14px;color:var(--text);font-weight:600;margin:0">
                          <input type="checkbox" id="${id}" ${v(id.replace('rf_',''))?'checked':''} style="width:auto;margin:0;padding:0;background:none"> ${lbl}
                        </label>`).join('')}

                  `)}

                  ${accSection('inventory','🏠','7. عدد الغرف',`
                    <div class="grid cols-3">

                      <div><label>الحد الأقصى للحجز (ليالٍ)</label><input type="number" id="rf_max_stay" value="${v('max_stay','')}" placeholder="بلا حد"/></div>
                    </div>
                  `)}

                  ${accSection('children','👶','8. سياسة الأطفال',`
                    <div style="display:flex;flex-direction:column;gap:10px">
                      ${[['rf_children_allowed','يسمح بالأطفال'],['rf_crib_available','يوجد سرير أطفال (مهد)'],['rf_extra_bed_available','يوجد سرير إضافي']].map(([id,lbl])=>`
                        <label style="display:flex;align-items:center;gap:10px;padding:12px 14px;border:1px solid var(--border-dim);border-radius:10px;background:var(--surface2);cursor:pointer;text-transform:none;letter-spacing:0;font-size:14px;color:var(--text);font-weight:600;margin:0">
                          <input type="checkbox" id="${id}" ${v(id.replace('rf_',''))?'checked':''} style="width:auto;margin:0;padding:0;background:none"> ${lbl}
                        </label>`).join('')}
                    </div>
                    <div class="grid cols-3" style="margin-top:14px">
                      <div><label>أقصى عمر للطفل (سنة)</label><input type="number" id="rf_child_max_age" value="${v('child_max_age',12)}" min="0" max="17"/></div>
                      <div><label>سعر سرير الأطفال / ليلة</label><input type="number" id="rf_crib_price" value="${v('crib_price',0)}" placeholder="0 = مجاني"/></div>
                      <div><label>سعر السرير الإضافي / ليلة</label><input type="number" id="rf_extra_bed_price" value="${v('extra_bed_price',0)}" placeholder="0 = مجاني"/></div>
                    </div>
                  `)}

                  ${accSection('extra','ℹ️','9. معلومات إضافية',checkGrid('extra_info',EXTRA_INFO,v('_extra_info',[])))}

                  <div style="display:flex;gap:12px;margin-top:20px;flex-wrap:wrap">
                    <button class="btn" id="saveRoomBtn" style="flex:1;min-width:200px;padding:14px">
                      💾 ${roomId?'حفظ التعديلات':'إضافة الغرفة'}
                    </button>
                    <button class="btn ghost" id="cancelBtn" style="padding:14px 24px">إلغاء</button>
                  </div>
                `;

                // ---- Accordion toggle ----
                document.querySelectorAll('.acc-header').forEach(h => {
                  h.onclick = () => {
                    const body = document.getElementById('acc-'+h.dataset.acc);
                    const arrow = h.querySelector('.acc-arrow-'+h.dataset.acc);
                    if (!body) return;
                    const isOpen = body.style.display !== 'none';
                    body.style.display = isOpen ? 'none' : 'block';
                    if (arrow) { arrow.textContent = isOpen ? '▼' : '▲'; }
                  };
                });

                // ---- Beds ----
                function renderBeds() {
                  const list = document.getElementById('bedsList');
                  if (!list) return;
                  if (!roomBeds.length) {
                    list.innerHTML = '<p style="color:var(--muted);font-size:13px;padding:8px 0">لم تضف أي نوع سرير بعد</p>';
                    return;
                  }
                  list.innerHTML = roomBeds.map((bed,i) => `
                    <div style="display:flex;align-items:center;gap:10px;padding:14px;border:1px solid var(--border-dim);border-radius:12px;background:var(--surface2);flex-wrap:wrap">
                      <span style="font-size:20px">🛏️</span>
                      <select data-btype="${i}" style="flex:1;min-width:160px;margin:0;padding:10px 12px">
                        ${BED_TYPES.map(t=>`<option value="${t}" ${bed.type===t?'selected':''}>${t}</option>`).join('')}
                      </select>
                      <div style="display:flex;align-items:center;gap:8px">
                        <button type="button" class="btn ghost" data-bminus="${i}" style="width:34px;height:34px;padding:0;font-size:18px;line-height:1">−</button>
                        <span style="font-size:16px;font-weight:800;min-width:24px;text-align:center">${bed.quantity}</span>
                        <button type="button" class="btn ghost" data-bplus="${i}" style="width:34px;height:34px;padding:0;font-size:18px;line-height:1">+</button>
                      </div>
                      <button type="button" class="btn danger" data-bdel="${i}" style="padding:8px 14px;font-size:13px">×</button>
                    </div>`).join('');
                  list.querySelectorAll('[data-btype]').forEach(s => { s.onchange = () => { roomBeds[+s.dataset.btype].type=s.value; }; });
                  list.querySelectorAll('[data-bminus]').forEach(b => { b.onclick = () => { if(roomBeds[+b.dataset.bminus].quantity>1){roomBeds[+b.dataset.bminus].quantity--;renderBeds();} }; });
                  list.querySelectorAll('[data-bplus]').forEach(b => { b.onclick = () => { roomBeds[+b.dataset.bplus].quantity++;renderBeds(); }; });
                  list.querySelectorAll('[data-bdel]').forEach(b => { b.onclick = () => { roomBeds.splice(+b.dataset.bdel,1);renderBeds(); }; });
                }
                renderBeds();
                document.getElementById('addBedBtn').onclick = () => {
                  roomBeds.push({type:BED_TYPES[0],quantity:1});
                  renderBeds();
                  document.getElementById('acc-beds').style.display='block';
                };

                // ---- Existing photos ----
                function renderExistingPhotos() {
                  const box = document.getElementById('existingPhotosList');
                  if (!box) return;
                  if (!existingPhotos.length) { box.innerHTML=''; return; }
                  box.innerHTML = existingPhotos.map((ph,i) => `
                    <div style="position:relative;width:110px;flex-shrink:0">
                      <img src="${ph.url}" style="width:110px;height:90px;object-fit:cover;border-radius:10px;border:${ph.is_cover?'2px solid var(--accent)':'1px solid var(--border-dim)'}">
                      ${ph.is_cover?'<div style="position:absolute;bottom:4px;right:4px;background:var(--accent);color:#000;font-size:9px;font-weight:800;padding:2px 6px;border-radius:6px">رئيسية</div>':''}
                      <button type="button" data-exdel="${i}" style="position:absolute;top:4px;right:4px;background:var(--danger);color:#fff;border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:13px;display:grid;place-items:center;line-height:1">×</button>
                      <button type="button" data-excover="${i}" style="position:absolute;top:4px;left:4px;background:rgba(0,0,0,.7);color:#fff;border:none;border-radius:6px;padding:2px 6px;cursor:pointer;font-size:10px">⭐</button>
                    </div>`).join('');
                  box.querySelectorAll('[data-exdel]').forEach(b => {
                    b.onclick = () => {
                      const idx=+b.dataset.exdel;
                      removedPhotoIds.push(existingPhotos[idx].id); // track for DB deletion
                      existingPhotos.splice(idx,1);
                      renderExistingPhotos();
                    };
                  });
                  box.querySelectorAll('[data-excover]').forEach(b => {
                    b.onclick = () => {
                      existingPhotos.forEach(p=>p.is_cover=false);
                      newPhotos.forEach(p=>p.isCover=false);
                      existingPhotos[+b.dataset.excover].is_cover=true;
                      renderExistingPhotos(); renderNewPreviews();
                    };
                  });
                }
                renderExistingPhotos();

                // ---- New photos ----
                function renderNewPreviews() {
                  const box = document.getElementById('newPhotosPreviews');
                  if (!box) return;
                  if (!newPhotos.length) { box.innerHTML=''; return; }
                  box.innerHTML = newPhotos.map((ph,i) => `
                    <div style="position:relative;width:110px;flex-shrink:0" draggable="true" data-nidx="${i}">
                      <img src="${ph.dataUrl}" style="width:110px;height:90px;object-fit:cover;border-radius:10px;border:${ph.isCover?'2px solid var(--accent)':'1px solid var(--border-dim)'}">
                      ${ph.isCover?'<div style="position:absolute;bottom:4px;right:4px;background:var(--accent);color:#000;font-size:9px;font-weight:800;padding:2px 6px;border-radius:6px">رئيسية</div>':''}
                      <button type="button" data-ndel="${i}" style="position:absolute;top:4px;right:4px;background:var(--danger);color:#fff;border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:13px;display:grid;place-items:center;line-height:1">×</button>
                      <button type="button" data-ncover="${i}" style="position:absolute;top:4px;left:4px;background:rgba(0,0,0,.7);color:#fff;border:none;border-radius:6px;padding:2px 6px;cursor:pointer;font-size:10px">⭐</button>
                    </div>`).join('');
                  box.querySelectorAll('[data-ndel]').forEach(b => { b.onclick=()=>{newPhotos.splice(+b.dataset.ndel,1);renderNewPreviews();}; });
                  box.querySelectorAll('[data-ncover]').forEach(b => {
                    b.onclick=()=>{
                      newPhotos.forEach(p=>p.isCover=false);
                      existingPhotos.forEach(p=>p.is_cover=false);
                      newPhotos[+b.dataset.ncover].isCover=true;
                      renderNewPreviews(); renderExistingPhotos();
                    };
                  });
                  // Drag-to-reorder
                  box.querySelectorAll('[data-nidx]').forEach(div => {
                    div.ondragstart=e=>{photoDragIdx=+div.dataset.nidx;e.dataTransfer.effectAllowed='move';};
                    div.ondragover=e=>{e.preventDefault();e.dataTransfer.dropEffect='move';};
                    div.ondrop=e=>{
                      e.preventDefault();
                      const from=photoDragIdx, to=+div.dataset.nidx;
                      if(from===to)return;
                      newPhotos.splice(to,0,newPhotos.splice(from,1)[0]);
                      renderNewPreviews();
                    };
                  });
                }

                const processFiles = files => {
                  Array.from(files).forEach(file=>{
                    const r=new FileReader();
                    r.onload=e=>{
                      newPhotos.push({file,dataUrl:e.target.result,isCover:false,position:newPhotos.length});
                      renderNewPreviews();
                    };
                    r.readAsDataURL(file);
                  });
                };

                const dz = document.getElementById('photoDropZone');
                const fi = document.getElementById('photoFileInput');
                document.getElementById('photoPickBtn').onclick = e=>{e.stopPropagation();fi.click();};
                dz.onclick = ()=>fi.click();
                fi.onchange = ()=>processFiles(fi.files);
                dz.ondragover = e=>{e.preventDefault();dz.style.borderColor='var(--accent)';};
                dz.ondragleave = ()=>{dz.style.borderColor='';};
                dz.ondrop = e=>{e.preventDefault();dz.style.borderColor='';processFiles(e.dataTransfer.files);};

                // ---- Back / Cancel ----
                document.getElementById('backBtn').onclick = showRoomsList;
                document.getElementById('cancelBtn').onclick = showRoomsList;

                // ---- SAVE ----
                document.getElementById('saveRoomBtn').onclick = async () => {
                  const btn = document.getElementById('saveRoomBtn');

                state.bookings = rows;

                if (!rows.length) {
                  box.innerHTML = `<div class="card"><p style="color:var(--muted);text-align:center;padding:20px">لا توجد حجوزات</p></div>`;
                  return;
                }

                box.innerHTML = rows.map((b) => {
                  const profile = usersMap[b.user_id];
                  const userName = profile?.full_name || b.guest_name || b.user_name || "عميل";
                  const phone = profile?.phone || b.guest_phone || "-";
                  return `
                  <div class="card booking-card"
                       data-uid="${b.user_id || ""}"
                       data-uname="${userName}"
                       style="cursor:pointer;margin-bottom:10px">
                    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
                      <div>
                        <p><b>👤 العميل:</b> ${userName}</p>
                        <p><b>📞 الهاتف:</b> ${phone}</p>
                        <p><b>🌍 البلد:</b>
                          ${b.guest_country_flag ? `<img src="${b.guest_country_flag}" style="width:20px;height:15px;vertical-align:middle;margin-left:4px">` : ""}
                          ${b.guest_country || "-"}
                        </p>
                      </div>
                      <span class="tag ${b.status || "pending"}">${b.status || "pending"}</span>
                    </div>
                    <hr style="border-color:var(--border-dim);margin:10px 0">
                    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;font-size:13px">
                      <p><b>📅 الوصول:</b><br>${fmtDate(b.check_in)}</p>
                      <p><b>📅 المغادرة:</b><br>${fmtDate(b.check_out)}</p>
                      <p><b>💰 السعر:</b><br>${fmt(b.total_price)} EGP</p>
                    </div>
                    <p style="font-size:12px;color:var(--muted);margin-top:8px">
                      💳 ${b.payment_method || "-"} &nbsp;·&nbsp; 🕐 ${new Date(b.created_at).toLocaleString("ar-EG")}
                    </p>
                  </div>`;
                }).join("");

                $$(".booking-card").forEach((card) => {
                  card.onclick = () => {
                    const uid = card.dataset.uid;
                    const uname = card.dataset.uname;
                    if (!uid) return toast("لا يوجد user_id لهذا الحجز");
                    renderPage("messages");
                    setTimeout(() => openChat(uid, uname), 150);
                  };
                });
              }

              await fetchBookings();
              $("#applyFilter").onclick = fetchBookings;
            };

            // --- CHANNELS ---
            pages.channels = async (el) => {
              el.innerHTML = `<h2>📡 القنوات الخارجية</h2>
          <div class="card">
            <h3>إضافة رابط iCal</h3>
            <select id="channelName">
              <option value="booking">Booking.com</option>
              <option value="airbnb">Airbnb</option>
              <option value="vrbo">VRBO</option>
            </select>
            <input id="icalUrl" placeholder="https://..." />
            <button class="btn" id="saveChannel" style="margin-top:8px">ربط القناة</button>
          </div>
          <div class="card">
            <h3>القنوات المرتبطة</h3>
            <div id="channelsList"><p style="color:var(--muted)">جارٍ التحميل...</p></div>
          </div>`;

              const loadChannels = async () => {
                const { data } = await sb
                  .from("hotel_channels")
                  .select("*")
                  .eq("hotel_id", state.hotel.id);
                document.getElementById("channelsList").innerHTML = (data || []).length
                  ? (data || []).map((c) =>
                      `<div class="card" style="margin-bottom:8px;padding:12px">
                        <b>${c.channel_name}</b>
                        <br><small style="color:var(--muted);word-break:break-all">${c.ical_url || ""}</small>
                      </div>`).join("")
                  : `<p style="color:var(--muted)">لا توجد قنوات مرتبطة</p>`;
              };

              await loadChannels();

              document.getElementById("saveChannel").onclick = async () => {
                const url = document.getElementById("icalUrl").value.trim();
                if (!url) return toast("أدخل رابط iCal", "error");
                const { error } = await sb.from("hotel_channels").insert({
                  hotel_id: state.hotel.id,
                  channel_name: document.getElementById("channelName").value,
                  ical_url: url,
                });
                if (error) return toast(error.message, "error");
                toast("✅ تم الربط", "success");
                document.getElementById("icalUrl").value = "";
                await loadChannels();
              };
            };

            // --- REVIEWS ---
            pages.reviews = async (el) => {
              const { data } = await sb
                .from("reviews")
                .select("*")
                .eq("hotel_id", state.hotel.id)
                .order("created_at", { ascending: false });
              const rs = data || [];
              const avg = rs.length
                ? (rs.reduce((s, r) => s + r.rating, 0) / rs.length).toFixed(1)
                : "-";
              el.innerHTML = `<h2>⭐ التقييمات</h2>
          <div class="grid cols-3"><div class="stat"><div class="v">${avg}</div><div class="l">متوسط التقييم</div></div><div class="stat"><div class="v">${rs.length}</div><div class="l">عدد التقييمات</div></div><div class="stat"><div class="v">${rs.filter((r) => !r.owner_reply).length}</div><div class="l">بانتظار الرد</div></div></div>
          <div class="card" style="margin-top:14px">${rs.map((r) => `<div class="review-item"><div><span class="stars">${"★".repeat(r.rating)}${"☆".repeat(5 - r.rating)}</span> <b>${r.guest_name || "نزيل"}</b> <small>${fmtDate(r.created_at)}</small></div><p>${r.comment || ""}</p>${r.owner_reply ? `<div class="alert info">ردك: ${r.owner_reply}</div>` : `<div style="display:flex;gap:8px"><input data-rid="${r.id}" placeholder="ردك..."/><button class="btn" data-rep="${r.id}">رد</button></div>`}</div>`).join("") || "<p>لا توجد تقييمات.</p>"}</div>`;
              $$("[data-rep]").forEach(
                (b) =>
                  (b.onclick = async () => {
                    const v = document.querySelector(
                      `[data-rid="${b.dataset.rep}"]`,
                    ).value;
                    if (!v) return;
                    await sb
                      .from("reviews")
                      .update({
                        owner_reply: v,
                        replied_at: new Date().toISOString(),
                      })
                      .eq("id", b.dataset.rep);
                    toast("✅", "success");
                    renderPage("reviews");
                  }),
              );
            };

            // --- MESSAGES ---
            pages.messages = async (el) => {
              if (state.messagesInterval) {
                clearInterval(state.messagesInterval);
                state.messagesInterval = null;
              }
              state.currentChatUserId = null;
              state.currentChatUserName = null;
              el.innerHTML = `
                <h2>💬 الرسائل</h2>
                <div class="grid cols-2" style="gap:14px;align-items:flex-start">
                  <div class="card"><h3>المحادثات</h3><div id="chatsList"></div></div>
                  <div class="card" id="chatBoxWrap" style="display:none">
                    <h3 id="chatTitle">محادثة</h3>
                    <div id="chatBox" class="chat-body" style="height:380px;overflow-y:auto;padding:10px;border:1px solid var(--border);border-radius:10px"></div>
                    <div class="chat-input" style="display:flex;gap:8px;margin-top:10px">
                      <input id="msgInput" placeholder="اكتب رسالة..." style="flex:1"/>
                      <button class="btn" id="sendReplyBtn">إرسال</button>
                    </div>
                  </div>
                </div>`;
              const { data, error } = await sb
                .from("hotel_messages")
                .select("user_id, sender_name, created_at")
                .eq("hotel_id", state.hotel.id)
                .order("created_at", { ascending: false });
              if (error) return toast(error.message, "error");
              const uniqueChats = [
                ...new Map((data || []).map((m) => [m.user_id, m])).values(),
              ];

              const msgUserIds = uniqueChats.map((c) => c.user_id).filter(Boolean);
              let profilesMap = {};
              if (msgUserIds.length) {
                const { data: profiles } = await sb
                  .from("profiles")
                  .select("auth_id, full_name")
                  .in("auth_id", msgUserIds);
                profilesMap = Object.fromEntries((profiles || []).map((p) => [p.auth_id, p.full_name]));
              }

              const list = $("#chatsList");
              if (!uniqueChats.length) {
                list.innerHTML = "<p>لا توجد محادثات</p>";
              } else {
                list.innerHTML = uniqueChats
                  .map((c) => {
                    const displayName = profilesMap[c.user_id] || c.sender_name || "عميل";
                    return `<div class="card chat-item" data-uid="${c.user_id}" data-uname="${displayName}" style="cursor:pointer;margin-bottom:8px;padding:10px">👤 ${displayName}</div>`;
                  })
                  .join("");
                $$(".chat-item").forEach((it) => {
                  it.onclick = () => openChat(it.dataset.uid, it.dataset.uname);
                });
              }
              $("#sendReplyBtn").onclick = sendReply;
              $("#msgInput").addEventListener("keydown", (e) => {
                if (e.key === "Enter") sendReply();
              });
              await sb
                .from("hotel_messages")
                .update({ read_at: new Date().toISOString() })
                .eq("hotel_id", state.hotel.id)
                .neq("sender_type", "hotel")
                .is("read_at", null);
              loadCounts();
            };

            async function openChat(userId, userName) {
              state.currentChatUserId = userId;
              state.currentChatUserName = userName || "عميل";
              const wrap = $("#chatBoxWrap");
              if (wrap) wrap.style.display = "block";
              $("#chatTitle").textContent =
                "💬 محادثة مع " + state.currentChatUserName;
              await loadChatMessages();
              if (state.messagesInterval) clearInterval(state.messagesInterval);
              state.messagesInterval = setInterval(loadChatMessages, 3000);
              setTimeout(() => {
                wrap?.scrollIntoView({ behavior: "smooth", block: "start" });
              }, 100);
            }

            async function loadChatMessages() {
              if (!state.hotel || !state.currentChatUserId) return;
              const { data, error } = await sb
                .from("hotel_messages")
                .select("*")
                .eq("hotel_id", state.hotel.id)
                .eq("user_id", state.currentChatUserId)
                .order("created_at", { ascending: true });
              if (error) return;
              const box = $("#chatBox");
              if (!box) return;
              box.innerHTML = (data || [])
                .map((m) => {
                  const mine = m.sender_type === "hotel";
                  return `<p style="text-align:${mine ? "left" : "right"};margin:6px 0">${mine ? "🏨 أنت: " : `👤 ${m.sender_name || "العميل"}: `}${m.message}</p>`;
                })
                .join("");
              box.scrollTop = box.scrollHeight;
            }

            async function sendReply() {
              const input = $("#msgInput");
              const message = input.value.trim();
              if (!message || !state.hotel || !state.currentChatUserId) return;
              const { error } = await sb.from("hotel_messages").insert([
                {
                  hotel_id: state.hotel.id,
                  user_id: state.currentChatUserId,
                  sender_type: "hotel",
                  sender_name: state.hotel.name || state.user.email,
                  message,
                },
              ]);
              if (error) return toast(error.message, "error");
              input.value = "";
              loadChatMessages();
              loadNotifications({ silent: true });
            }

            // --- STATS ---
            pages.stats = async (el) => {
              el.innerHTML = `<h2>📈 الإحصائيات</h2>
          <div class="grid cols-2">
            <div class="card"><h3>إيرادات الشهر</h3><canvas id="s1" height="200"></canvas></div>
            <div class="card"><h3>إيرادات السنة</h3><canvas id="s2" height="200"></canvas></div>
            <div class="card"><h3>عدد الحجوزات</h3><canvas id="s3" height="200"></canvas></div>
            <div class="card"><h3>نسبة الإشغال (شهرياً)</h3><canvas id="s4" height="200"></canvas></div>
          </div>`;
              const { data: all } = await sb
                .from("bookings")
                .select("total_price,check_in,status")
                .eq("hotel_id", state.hotel.id);
              const now = new Date();
              const monthKeys = [...Array(12)].map((_, i) => {
                const d = new Date(now.getFullYear(), i, 1);
                return d.toISOString().slice(0, 7);
              });
              const monthLabels = monthKeys.map(
                (k) =>
                  [
                    "يناير",
                    "فبراير",
                    "مارس",
                    "أبريل",
                    "مايو",
                    "يونيو",
                    "يوليو",
                    "أغسطس",
                    "سبتمبر",
                    "أكتوبر",
                    "نوفمبر",
                    "ديسمبر",
                  ][+k.slice(5) - 1],
              );
              const monthRev = monthKeys.map((k) =>
                (all || [])
                  .filter((b) => b.check_in?.startsWith(k))
                  .reduce((s, b) => s + Number(b.total_price || 0), 0),
              );
              const monthCount = monthKeys.map(
                (k) => (all || []).filter((b) => b.check_in?.startsWith(k)).length,
              );
              const monthOcc = monthCount.map((c) =>
                state.rooms.length
                  ? Math.min(100, Math.round((c / state.rooms.length / 30) * 100))
                  : 0,
              );
              const ds = now.toISOString().slice(0, 7);
              const monthDailyLabels = [...Array(30)].map((_, i) => i + 1);
              const monthDailyRev = [...Array(30)].map((_, i) => {
                const d = String(i + 1).padStart(2, "0");
                return (all || [])
                  .filter((b) => b.check_in?.startsWith(`${ds}-${d}`))
                  .reduce((s, b) => s + Number(b.total_price || 0), 0);
              });
              new Chart($("#s1"), {
                type: "bar",
                data: {
                  labels: monthDailyLabels,
                  datasets: [
                    { label: "EGP", data: monthDailyRev, backgroundColor: "#ffb400" },
                  ],
                },
              });
              new Chart($("#s2"), {
                type: "line",
                data: {
                  labels: monthLabels,
                  datasets: [
                    {
                      label: "EGP",
                      data: monthRev,
                      borderColor: "#ff7a00",
                      backgroundColor: "rgba(255,122,0,.15)",
                      fill: true,
                      tension: 0.3,
                    },
                  ],
                },
              });
              new Chart($("#s3"), {
                type: "bar",
                data: {
                  labels: monthLabels,
                  datasets: [
                    { label: "حجوزات", data: monthCount, backgroundColor: "#2563eb" },
                  ],
                },
              });
              new Chart($("#s4"), {
                type: "line",
                data: {
                  labels: monthLabels,
                  datasets: [
                    {
                      label: "%",
                      data: monthOcc,
                      borderColor: "#27b82e",
                      fill: false,
                      tension: 0.3,
                    },
                  ],
                },
              });
            };

            // --- WALLET ---
            pages.wallet = async (el) => {
              const [{ data: bks }, { data: wds }, { data: pi }] = await Promise.all([
                sb
                  .from("bookings")
                  .select("total_price,commission,status")
                  .eq("hotel_id", state.hotel.id)
                  .neq("status", "cancelled"),
                sb
                  .from("withdrawals")
                  .select("*")
                  .eq("hotel_id", state.hotel.id)
                  .order("created_at", { ascending: false }),
                sb
                  .from("payment_info")
                  .select("*")
                  .eq("hotel_id", state.hotel.id)
                  .maybeSingle(),
              ]);
              const sales = (bks || []).reduce(
                (s, b) => s + Number(b.total_price || 0),
                0,
              );
              const commission = sales * 0.1;
              const earnings = sales - commission;
              const withdrawn = (wds || [])
                .filter((w) => w.status === "paid")
                .reduce((s, w) => s + Number(w.amount), 0);
              const balance = earnings - withdrawn;
              el.innerHTML = `<h2>💳 المحفظة</h2>
          <div class="grid cols-3">
            ${stat("إجمالي المبيعات", fmt(sales))}
            ${stat("عمولة Sunget (10%)", fmt(commission))}
            ${stat("أرباحك الصافية", fmt(earnings))}
            ${stat("مسحوبات سابقة", fmt(withdrawn))}
            ${stat("الرصيد المتاح", fmt(balance))}
          </div>
          <div class="card" style="margin-top:14px"><h3>طلب سحب</h3>
            <div class="grid cols-2">
              <div><label>المبلغ</label><input type="number" id="wd_amount" max="${balance}"/></div>
              <div><label>الطريقة</label><select id="wd_method"><option value="paypal">PayPal</option><option value="bank">حساب بنكي</option></select></div>
            </div>
            <div><label>PayPal Email</label><input id="wd_paypal" value="${pi?.paypal_email || ""}"/></div>
            <button class="btn success" id="wdBtn">طلب السحب</button>
          </div>
          <div class="card"><h3>السحوبات السابقة</h3><table><tr><th>المبلغ</th><th>الطريقة</th><th>الحالة</th><th>التاريخ</th></tr>${(wds || []).map((w) => `<tr><td>${fmt(w.amount)}</td><td>${w.method}</td><td><span class="tag ${w.status === "paid" ? "completed" : "pending"}">${w.status}</span></td><td>${fmtDate(w.created_at)}</td></tr>`).join("") || '<tr><td colspan="4">لا يوجد</td></tr>'}</table></div>`;
              $("#wdBtn").onclick = async () => {
                const amount = +$("#wd_amount").value;
                if (!amount || amount > balance)
                  return toast("مبلغ غير صالح", "error");
                const { error } = await sb.from("withdrawals").insert({
                  hotel_id: state.hotel.id,
                  amount,
                  method: $("#wd_method").value,
                  paypal_email: $("#wd_paypal").value,
                });
                if (error) return toast(error.message, "error");
                toast("✅ تم تسجيل الطلب", "success");
                renderPage("wallet");
              };
            };

            // --- PAYMENT INFO ---
            pages.payment = async (el) => {
              const { data } = await sb
                .from("payment_info")
                .select("*")
                .eq("hotel_id", state.hotel.id)
                .maybeSingle();
              const v = (k) => data?.[k] || "";
              el.innerHTML = `<h2>🏦 بيانات الدفع</h2><div class="card">
          <label>PayPal Email</label><input id="pi_paypal_email" value="${v("paypal_email")}"/>
          <hr><div class="grid cols-2">
            <div><label>اسم البنك</label><input id="pi_bank_name" value="${v("bank_name")}"/></div>
            <div><label>رقم الحساب</label><input id="pi_account_number" value="${v("account_number")}"/></div>
            <div><label>IBAN</label><input id="pi_iban" value="${v("iban")}"/></div>
            <div><label>SWIFT</label><input id="pi_swift" value="${v("swift")}"/></div>
          </div>
          <label>اسم المستفيد</label><input id="pi_beneficiary_name" value="${v("beneficiary_name")}"/>
          <button class="btn" id="piSave">💾 حفظ</button>
        </div>`;
              $("#piSave").onclick = async () => {
                const payload = { hotel_id: state.hotel.id };
                [
                  "paypal_email",
                  "bank_name",
                  "account_number",
                  "iban",
                  "swift",
                  "beneficiary_name",
                ].forEach((k) => (payload[k] = $("#pi_" + k).value));
                const { error } = await sb.from("payment_info").upsert(payload);
                if (error) return toast(error.message, "error");
                toast("✅", "success");
              };
            };

            // --- ACTIVITY ---
            pages.activity = async (el) => {
              const { data } = await sb
                .from("activity_log")
                .select("*")
                .eq("hotel_id", state.hotel.id)
                .order("created_at", { ascending: false })
                .limit(200);
              el.innerHTML = `<h2>📜 سجل النشاط</h2><div class="card"><table><tr><th>التاريخ</th><th>المستخدم</th><th>الإجراء</th><th>الهدف</th></tr>${(data || []).map((a) => `<tr><td>${new Date(a.created_at).toLocaleString("ar-EG")}</td><td>${a.actor_name || "-"}</td><td>${a.action}</td><td>${a.target || "-"}</td></tr>`).join("") || '<tr><td colspan="4">لا يوجد</td></tr>'}</table></div>`;
            };

            // ============ START ============
            init();
    </script>
<script>
if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js")
        .then(() => console.log("Service Worker Registered"))
        .catch(err => console.log(err));
    });
}
</script>
    
  </body>
</html>
