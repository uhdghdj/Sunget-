/* ================== HOTEL DETAILS - SUNGET.COM ================== */

/* ---------- THEME VARIABLES ---------- */
:root,
[data-theme="dark"] {
  --bg: #0b0b0f;
  --bg-2: #14141c;
  --surface: #1a1a24;
  --surface-2: #20202c;
  --text: #ffffff;
  --text-muted: #b8b8c4;
  --border: rgba(255, 255, 255, 0.08);
  --accent: #ffb400;
  --accent-2: #ff7a00;
  --danger: #e63946;
  --success: #27b82e;
  --shadow: 0 10px 30px rgba(2, 1, 1, 0.45);
  --radius: 14px;
  --header-h: 80px;
}

[data-theme="light"] {
  --bg: #f7f7fb;
  --bg-2: #ffffff;
  --surface: #ffffff;
  --surface-2: #f1f1f7;
  --text: #1a1a24;
  --text-muted: #555566;
  --border: rgba(0, 0, 0, 0.08);
  --accent: #ff8a00;
  --accent-2: #ff5e00;
  --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
}

/* ================== GOOGLE TRANSLATE - COMPLETE HIDE ================== */
#google_translate_element,
.goog-te-banner-frame,
.goog-te-menu-frame,
.goog-te-balloon-frame,
.goog-te-gadget,
.goog-logo-link,
.goog-te-gadget span,
.skiptranslate,
.goog-te-combo,
.VIpgJd-ZVi9od-ORHb-OEVmkb svg,
[aria-label*="Google"],
[title*="Google"] {
  display: none !important;
  visibility: hidden !important;
  opacity: 0 !important;
  height: 0 !important;
  width: 0 !important;
  overflow: hidden !important;
  position: absolute !important;
  z-index: -9999 !important;
}

body {
  top: 0 !important;
  padding-top: 0 !important;
  margin-top: 0 !important;
}

/* إخفاء أي تأثيرات جانبية */
.goog-text-highlight,
.goog-te-modal,
.goog-te-menu-value {
  display: none !important;
}

/* ---------- RESET & BASE ---------- */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: "Cairo", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 0.3s ease, color 0.3s ease;
}

html[dir="rtl"] {
  direction: rtl;
  text-align: right;
}

/* باقي الـ CSS كما هو بدون تغيير */
.hotel-header {
  background: linear-gradient(135deg, rgba(11, 11, 15, 0.95), rgba(26, 26, 36, 0.95));
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 25px 5%;
  text-align: center;
  position: relative;
  box-shadow: var(--shadow);
}

.hotel-header::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  opacity: 0.1;
  z-index: 0;
}

.hotel-header h1 {
  font-size: clamp(28px, 6vw, 42px);
  font-weight: 800;
  margin-bottom: 8px;
  position: relative;
  z-index: 1;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: -0.5px;
}

.hotel-header .price {
  font-size: clamp(20px, 4vw, 28px);
  font-weight: 700;
  color: var(--accent);
  position: relative;
  z-index: 1;
}

/* باقي الـ CSS كما هو... (السلايدر، الأزرار، المرافق، الشات، إلخ) */
.slider-wrap {
  max-width: 1100px;
  margin: 30px auto 0;
  padding: 0 5%;
}

.slider {
  position: relative;
  overflow: hidden;
  height: 450px;
  border-radius: var(--radius);
  direction: ltr;
}

.slides {
  display: flex;
  flex-wrap: nowrap;
  height: 100%;
  width: 100%;
  transition: transform 0.5s ease;
  will-change: transform;
}

.slides img {
  width: 100%;
  height: 100%;
  flex: 0 0 100%;
  object-fit: cover;
  user-select: none;
  -webkit-user-drag: none;
  pointer-events: none;
}

.nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: rgba(0, 0, 0, 0.45);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.25);
  color: #fff;
  font-size: 22px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
}

.nav.prev { left: 15px; }
.nav.next { right: 15px; }

.nav:hover {
  background: var(--accent);
  color: #000;
  transform: translateY(-50%) scale(1.1);
}

.dots {
  display: flex;
  gap: 8px;
  justify-content: center;
  padding: 18px 0 4px;
}

.dots span {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.3);
  cursor: pointer;
  transition: all 0.3s ease;
  display: inline-block;
}

.dots span.active,
.dots span:hover {
  background: var(--accent);
  transform: scale(1.2);
}

.book-wrap {
  padding: 0 5%;
  margin: 20px 0 40px;
  display: flex;
  justify-content: center;
}

.book-btn {
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: #000;
  font-weight: 700;
  font-size: 18px;
  padding: 16px 40px;
  border-radius: 50px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 10px 25px rgba(255, 180, 0, 0.35);
  transition: all 0.3s ease;
  border: none;
  cursor: pointer;
}

.book-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 15px 35px rgba(255, 180, 0, 0.45);
}

.hotel-info {
  max-width: 900px;
  margin: 0 auto 60px;
  padding: 0 5%;
}

.hotel-info h2,
.amenities-section h2,
.chat-section h2 {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 20px;
  text-align: center;
  position: relative;
}

.hotel-info h2::after,
.amenities-section h2::after,
.chat-section h2::after {
  content: "";
  display: block;
  width: 60px;
  height: 4px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  border-radius: 2px;
  margin: 10px auto 0;
}

.hotel-info p {
  font-size: 16px;
  line-height: 1.9;
  color: var(--text-muted);
  text-align: center;
  max-width: 700px;
  margin: 0 auto;
  padding: 0 20px;
}

.amenities-section {
  max-width: 900px;
  margin: 0 auto 60px;
  padding: 0 5%;
}

.amenities {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 15px;
  padding: 20px 0;
}

.amenity {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 12px;
  text-align: center;
  font-weight: 600;
  font-size: 14px;
  transition: all 0.3s ease;
  cursor: default;
}

.amenity:hover {
  background: var(--surface-2);
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
  border-color: var(--accent);
}

.map-section {
  max-width: 900px;
  margin: 0 auto 60px;
  padding: 0 5%;
  text-align: center;
}

.map-btn {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  background: var(--surface);
  color: var(--text);
  padding: 16px 30px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 16px;
  border: 2px solid var(--border);
  transition: all 0.3s ease;
}

.map-btn:hover {
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: #000;
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(255, 180, 0, 0.35);
  border-color: var(--accent);
}

.chat-section {
  max-width: 700px;
  margin: 0 auto 80px;
  background: var(--surface);
  border-radius: var(--radius);
  padding: 40px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}

.chat-box {
  background: var(--surface-2);
  border-radius: 16px;
  height: 400px;
  padding: 20px;
  overflow-y: auto;
  margin-bottom: 20px;
  border: 1px solid var(--border);
}

.chat-box p {
  margin-bottom: 12px;
  padding: 12px 16px;
  border-radius: 18px;
  max-width: 75%;
  font-size: 15px;
  line-height: 1.5;
  word-wrap: break-word;
  animation: messageSlide 0.3s ease;
}

@keyframes messageSlide {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.chat-box p[style*="text-align: right"] {
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: #000;
  margin-left: auto;
}

.chat-box p[style*="text-align: left"] {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
}

.chat-input-wrap {
  display: flex;
  gap: 12px;
  align-items: center;
}

#chatInput {
  flex: 1;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 25px;
  padding: 14px 20px;
  font-family: inherit;
  font-size: 15px;
  color: var(--text);
  outline: none;
  transition: all 0.3s ease;
}

#chatInput:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(255, 180, 0, 0.15);
}

#sendMsg {
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: #000;
  font-weight: 700;
  padding: 14px 24px;
  border-radius: 25px;
  font-size: 15px;
  cursor: pointer;
  border: none;
  transition: all 0.3s ease;
  white-space: nowrap;
}

#sendMsg:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(255, 180, 0, 0.35);
}

.chat-box::-webkit-scrollbar { width: 6px; }
.chat-box::-webkit-scrollbar-track { background: transparent; }
.chat-box::-webkit-scrollbar-thumb {
  background: rgba(255, 255, 255, 0.2);
  border-radius: 10px;
}
.chat-box::-webkit-scrollbar-thumb:hover { background: var(--accent); }

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--surface-2); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

@media (max-width: 768px) {
  .slider { height: 350px; }
  .nav { width: 42px; height: 42px; font-size: 18px; }
  .hotel-header { padding: 20px 4%; }
  .book-btn { padding: 14px 30px; font-size: 16px; }
  .amenities { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; }
  .chat-section { margin-bottom: 40px; padding: 30px 20px; }
  .chat-box { height: 300px; }
}

@media (max-width: 480px) {
  .slider { height: 240px; border-radius: 12px; }
  .nav { width: 38px; height: 38px; font-size: 16px; }
  .nav.prev { left: 8px; }
  .nav.next { right: 8px; }
  .hotel-header h1 { font-size: 24px; }
  .hotel-header .price { font-size: 20px; }
  .book-btn { padding: 12px 24px; font-size: 15px; }
  .amenities { grid-template-columns: 1fr 1fr; }
  .amenity { padding: 14px 10px; font-size: 13px; }
  .chat-input-wrap { flex-direction: column; }
  #sendMsg { width: 100%; }
  .chat-section { padding: 25px 15px; }
}

.policies-section{

.policies-section h2{

      }

      function updateSlider() {
        const slidesEl = document.getElementById("slides");
        const dotsEl = document.querySelectorAll("#dots span");
        slidesEl.style.transform = `translateX(-${currentSlide * 100}%)`;
        dotsEl.forEach((dot, i) => dot.classList.toggle("active", i === currentSlide));
      }

      document.querySelector(".nav.next")?.addEventListener("click", () => {
        const total = document.querySelectorAll("#slides img").length;
        if (!total) return;
        currentSlide = (currentSlide + 1) % total;
        updateSlider();
      });

      document.querySelector(".nav.prev")?.addEventListener("click", () => {
        const total = document.querySelectorAll("#slides img").length;
        if (!total) return;
        currentSlide = (currentSlide - 1 + total) % total;
        updateSlider();
      });

      async function loadMessages() {
        if (!hotelId) return;
        const { data, error } = await supabaseClient
          .from("hotel_messages").select("*")
          .eq("hotel_id", hotelId)
          .order("created_at", { ascending: true });
        if (error || !data) return;

        const box = document.getElementById("chatBox");
        box.innerHTML = "";
        data.forEach((msg) => {
          const p = document.createElement("p");
          const senderText = msg.sender_type === "hotel"
            ? i18next.t("chat.hotel") : i18next.t("chat.you");
          p.textContent = senderText + " " + msg.message;
          p.style.textAlign = msg.sender_type === "hotel" ? "left" : "right";
          box.appendChild(p);
        });
        box.scrollTop = box.scrollHeight;
      }

      async function sendMessage() {
        const input = document.getElementById("chatInput");
        const msg = input.value.trim();
        if (!msg || !hotelId) return;

        const { data: userData } = await supabaseClient.auth.getUser();
        if (!userData.user) return alert("يجب تسجيل الدخول");

        const { error } = await supabaseClient.from("hotel_messages").insert([{
          hotel_id: hotelId,
          hotel_name: document.getElementById("hotelName").textContent,
          user_id: userData.user.id,
          message: msg,
          sender_type: "user",
        }]);
        if (error) return console.error(error);

        input.value = "";
        loadMessages();
      }

      document.getElementById("sendMsg").addEventListener("click", sendMessage);
      document.getElementById("chatInput").addEventListener("keydown", (e) => {
        if (e.key === "Enter") sendMessage();
      });

      document.getElementById("bookNowBtn").addEventListener("click", () => {
        window.location.href = `booking.html?id=${hotelId}`;
      });

      function updateContent() {
        document.querySelectorAll("[data-i18n]").forEach((el) => {
          el.innerHTML = i18next.t(el.dataset.i18n);
        });
        document.querySelectorAll("[data-i18n-placeholder]").forEach((el) => {
          el.placeholder = i18next.t(el.dataset.i18nPlaceholder);
        });
        document.documentElement.lang = i18next.language;
        document.documentElement.dir = i18next.language === "ar" ? "rtl" : "ltr";
      }

      i18next.init({
        lng: localStorage.getItem("lang") || "ar",
        fallbackLng: "en",
        resources: {
          ar: { translation: {
            hotel: { price: "جنيه / ليلة", details: "عرض التفاصيل", amenities: "المرافق",
              map: "عرض الموقع على الخريطة", mapUnavailable: "الموقع غير متوفر",
              noHotels: "لا توجد فنادق حالياً", noAmenities: "لا توجد مرافق مسجلة" },
            chat: { title: "الدردشة مع الفندق", placeholder: "اكتب رسالتك...",
              send: "إرسال", you: " أنت:", hotel: " الفندق:" },
          }},
          en: { translation: {
            hotel: { price: "EGP / night", details: "View details", amenities: "Amenities",
              map: "View on map", mapUnavailable: "Location not available",
              noHotels: "No hotels available", noAmenities: "No amenities available" },
            chat: { title: "Chat with the hotel", placeholder: "Type your message...",
              send: "Send", you: " You:", hotel: " Hotel:" },
          }},
        },
      }, function () {
        updateContent();
        loadHotel();
        loadMessages();
        setInterval(loadMessages, 3000);
      });

const policiesBox = document.getElementById("hotelPolicies");

if (policiesBox) {
  policiesBox.innerHTML = "";

  if (data.policies && data.policies.trim() !== "") {

    data.policies
      .split(",")
      .forEach(policy => {

        policiesBox.innerHTML += `
          <div class="policy-item">
            <i class="fa-solid fa-circle-check"></i>
            ${policy.trim()}
          </div>
        `;

      });

  } else {

    policiesBox.innerHTML = `
      <div class="policy-item">
        لا توجد سياسات متاحة
      </div>
    `;

  }
}
