<html lang="ar" dir="rtl">
<head>

<style>
body{
  font-family:"Cairo",sans-serif;

}

.card{
  max-width:600px;
  margin:auto;
  background:#1c1c1c;
  padding:20px;
  border-radius:15px;
  text-align:center;
}

.status{
  margin-top:15px;
  padding:10px;
  background:#1e8e3e;
  border-radius:10px;
  font-weight:bold;
}

/* ================== GOOGLE TRANSLATE - COMPLETE HIDE ================== */

</head>
<body>

<div class="card">
  <h2>تفاصيل الحجز</h2>

  <div id="bookingInfo">
    جاري التحميل...
  </div>

  <div class="status">
    ✅ تم تأكيد الحجز
  </div>
</div>

<script>

const supabaseClient = supabase.createClient(
  "https://mqvmxqzwvpasdytbpbke.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xdm14cXp3dnBhc2R5dGJwYmtlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjIyODMwMjksImV4cCI6MjA3Nzg1OTAyOX0.jHrxC0IcuWYkSaB2y-guc5tl5dPPWFSoasv3rmjcxuM"
);
const params = new URLSearchParams(location.search);
const bookingId = params.get("id");

async function loadBooking() {

  const { data, error } = await supabaseClient
    .from("bookings")
    .select("*")
    .eq("id", bookingId)
    .single();

  if (error || !data) {
    document.getElementById("bookingInfo").innerHTML =
      "الحجز غير موجود";
    return;
  }

  document.getElementById("bookingInfo").innerHTML = `
    <h3>${data.hotel_name}</h3>

    <p>رقم الحجز: ${data.id}</p>

    <p>
      ${data.check_in}
      →
      ${data.check_out}
    </p>
  `;
}

loadBooking();
</script>
 <script src="translate.js"></script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
