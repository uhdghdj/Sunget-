<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SUNGET — استعادة كلمة المرور</title>
    <link rel="icon" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  </head>
  <style>
:root {
  --bg: #0b0b0f;
  --surface: #1a1a24;
  --text: #ffffff;
  --text-muted: #b8b8c4;
  --border: rgba(255,255,255,0.08);
  --accent: #ffb400;
  --success: #27b82e;
  --danger: #e63946;
  --shadow: 0 35px 60px -15px rgba(0,0,0,0.5);
  --radius: 20px;
  --gradient: linear-gradient(135deg, #ffb400, #ff7a00);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.card {
  background: rgba(26,26,36,0.95);
  backdrop-filter: blur(30px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 60px 50px;
  width: 100%;
  max-width: 480px;
  box-shadow: var(--shadow);
  text-align: center;
  position: relative;
}
/* ================== GOOGLE TRANSLATE - COMPLETE HIDE ================== */
#google_translate_element,
.goog-te-banner-frame,
.goog-te-menu-frame,
.goog-te-balloon-frame,
.goog-te-gadget,
.goog-logo-link,
.goog-te-gadget span,
.skiptranslate,
.goog-te-combo,
.VIpgJd-ZVi9od-ORHb-OEVmkb svg,
[aria-label*="Google"],
[title*="Google"] {
  display: none !important;
  visibility: hidden !important;
  opacity: 0 !important;
  height: 0 !important;
  width: 0 !important;
  overflow: hidden !important;
  position: absolute !important;
  z-index: -9999 !important;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 6px;
  background: var(--gradient);
  border-radius: var(--radius) var(--radius) 0 0;
}

.reset-icon { 
  font-size: 4rem; 
  margin-bottom: 24px;
  background: var(--gradient);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

.logo h3 {
  font-size: 2.5rem;
  font-weight: 800;
  background: var(--gradient);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}

.logo h3:nth-of-type(2) {
  font-size: 1.8rem;
  color: var(--text-muted);
  font-weight: 700;
}

.desc {
  color: var(--text-muted);
  font-size: 1.1rem;
  line-height: 1.7;
  margin-bottom: 32px;
}

#resetForm {
  display: flex;
  flex-direction: column;
  gap: 24px;
  margin-bottom: 24px;
}

#resetForm input {
  padding: 20px 24px;
  border: 2px solid var(--border);
  border-radius: 16px;
  font-size: 1.1rem;
  background: var(--surface);
  color: var(--text);
  font-family: inherit;
  text-align: right;
  transition: all 0.3s ease;
}

#resetForm input::placeholder { color: var(--text-muted); }
#resetForm input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(255,180,0,0.15);
  transform: translateY(-2px);
}

#resetBtn {
  padding: 20px 32px;
  border: none;
  border-radius: 50px;
  background: var(--gradient);
  color: #000;
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.4s ease;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-family: inherit;
}

#resetBtn:hover:not(:disabled) {
  transform: translateY(-4px);
  box-shadow: 0 20px 40px rgba(255,180,0,0.4);
}

#resetBtn:disabled {
  opacity: 0.7;
  cursor: not-allowed;
}

#resetBtn.loading::after {
  content: '';
  position: absolute;
  width: 24px; height: 24px;
  border: 3px solid transparent;
  border-top: 3px solid #000;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}

@keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

#msgDiv { margin-top: 24px; min-height: 24px; }
.msg {
  padding: 18px 24px;
  border-radius: 16px;
  font-weight: 600;
  font-size: 1rem;
  margin-bottom: 16px;
  backdrop-filter: blur(15px);
  border: 1px solid transparent;
  text-align: center;
}

.msg-success { 
  background: rgba(39,184,46,0.18); 
  color: var(--success); 
  border-color: rgba(39,184,46,0.35); 
}

.msg-error { 
  background: rgba(230,57,70,0.18); 
  color: var(--danger); 
  border-color: rgba(230,57,70,0.35); 
}

.msg-warning { 
  background: rgba(255,180,0,0.18); 
  color: var(--accent); 
  border-color: rgba(255,180,0,0.35); 
}

.links-section {
  margin-top: 32px;
  padding-top: 28px;
  border-top: 1px solid var(--border);
}

.links-section .link {
  color: var(--text-muted);
  text-decoration: none;
  font-weight: 600;
  display: block;
  margin: 12px 0;
  transition: color 0.3s ease;
}

.links-section .link:hover { color: var(--accent); }

@media (max-width: 480px) {
  .card { padding: 40px 28px; margin: 10px; }
  .logo h3 { font-size: 2rem; }
  .logo h3:nth-of-type(2) { font-size: 1.4rem; }
}
  </style>
  
  <body>
    <div class="card">
      <div class="reset-icon">🔑</div>
      
      <div class="logo">
        <h3>SUNGET.COM</h3>
        <h3>استعادة كلمة المرور</h3>
      </div>

      <p class="desc">أدخل بريدك الإلكتروني وسوف نرسل لك رابط إعادة تعيين كلمة المرور</p>
      
      <form id="resetForm">
        <input id="emailInput" type="email" placeholder="البريد الإلكتروني" required>
        <button type="submit" id="resetBtn">إرسال رابط الاستعادة</button>
      </form>

      <div id="msgDiv"></div>

      <div class="links-section">
        <a href="login.html" class="link">← العودة لتسجيل الدخول</a>
        <a href="signup.html" class="link">إنشاء حساب جديد</a>
      </div>
    </div>

    <!-- Supabase فقط -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
      // إعداد Supabase باسم مختلف تماماً
      const supabaseClient = supabase.createClient(
        'https://mqvmxqzwvpasdytbpbke.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xdm14cXp3dnBhc2R5dGJwYmtlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjIyODMwMjksImV4cCI6MjA3Nzg1OTAyOX0.jHrxC0IcuWYkSaB2y-guc5tl5dPPWFSoasv3rmjcxuM'
      );

      // Rate Limit Controller
      let requestCooldown = 0;
      let requestCount = 0;

      // عرض رسائل
      function showMessage(text, type = 'msg-error') {
        const msgDiv = document.getElementById('msgDiv');
        msgDiv.innerHTML = `<div class="${type}">${text}</div>`;
        
        setTimeout(() => {
          msgDiv.innerHTML = '';
        }, 10000);
      }

      // فحص Rate Limit
      function canSendRequest() {
        const now = Date.now();
        
        // Reset counter كل دقيقة
        if (now - requestCooldown > 60000) {
          requestCount = 0;
        }
        
        if (requestCount >= 2) {
          showMessage('⚠️ حاولت كثيراً. انتظر دقيقة ثم أعد المحاولة.', 'msg-warning');
          return false;
        }
        
        if (now - requestCooldown < 5000) { // 5 ثوان تأخير
          const remaining = Math.ceil((5000 - (now - requestCooldown)) / 1000);
          showMessage(`⏳ انتظر ${remaining} ثانية`, 'msg-warning');
          return false;
        }
        
        return true;
      }

      // معالج النموذج
      document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const emailInput = document.getElementById('emailInput');
        const resetBtn = document.getElementById('resetBtn');
        const email = emailInput.value.trim();
        
        // فحص البريد
        if (!email || !email.includes('@')) {
          showMessage('❌ أدخل بريد إلكتروني صحيح');
          return;
        }
        
        // Rate Limit
        if (!canSendRequest()) return;
        
        // Loading
        resetBtn.disabled = true;
        resetBtn.classList.add('loading');
        resetBtn.innerHTML = '⏳ جارٍ الإرسال...';
        requestCount++;
        requestCooldown = Date.now();
        
        try {
          const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
            redirectTo: 'https://sunget.site/update-password.html'
          });
          
          if (error) {
            console.error('Reset Error:', error);
            
            if (error.message.includes('rate limit') || error.status === 429) {
              showMessage('⚠️ تم تجاوز الحد المسموح. جرب بعد 15 دقيقة.', 'msg-warning');
            } else if (error.message.includes('not found')) {
              showMessage('❌ لا يوجد حساب بهذا البريد الإلكتروني', 'msg-error');
            } else {
              showMessage(`❌ خطأ: ${error.message}`, 'msg-error');
            }
            return;
          }
          
          // نجاح 🎉
          showMessage(
            `✅ تم إرسال الرابط إلى:<br><strong>${email}</strong><br><small>📧 تحقق من Spam إذا لم يصل</small>`, 
            'msg-success'
          );
          
          emailInput.value = '';
          
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 6000);
          
        } catch (err) {
          console.error('Unexpected Error:', err);
          showMessage('❌ خطأ غير متوقع. حاول مرة أخرى', 'msg-error');
        } finally {
          resetBtn.disabled = false;
          resetBtn.classList.remove('loading');
          resetBtn.innerHTML = 'إرسال رابط الاستعادة';
        }
      });

      // دعم Enter
      document.getElementById('emailInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          document.getElementById('resetForm').dispatchEvent(new Event('submit'));
        }
      });

      console.log('✅ Password Reset Ready - No Conflicts');
    </script>
  <script src="translate.js"></script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script>
if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js")
        .then(() => console.log("Service Worker Registered"))
        .catch(err => console.log(err));
    });
}
</script>
  </body>
</html>
