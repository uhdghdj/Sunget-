<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <link rel="manifest" href="/manifest.json">

<meta name="theme-color" content="#d4af37">

<meta name="mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-capable" content="yes">

<link rel="apple-touch-icon" href="/icons/icon-192.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>الدفع</title>
<link rel="icon" href="favicon.png">
  <style>
    :root,
    [data-theme="dark"] {
      --bg: #0b0b0f;
      --bg-2: #14141c;
      --surface: #1a1a24;
      --surface-2: #20202c;
      --text: #ffffff;
      --text-muted: #b8b8c4;
      --border: rgba(255, 255, 255, 0.12);
      --accent: #ffb400;
      --accent-2: #ff7a00;
      --danger: #e63946;
      --success: #27b82e;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      --shadow-lg: 0 35px 80px rgba(0, 0, 0, 0.7);
      --radius: 20px;
      --gradient-accent: linear-gradient(135deg, #ffb400, #ff7a00);
      --glow: 0 0 40px rgba(255, 180, 0, 0.5);
    }

    [data-theme="light"] {
      --bg: #fff8ec;
      --bg-2: #fff2dc;
      --surface: #ffffff;
      --surface-2: #fff7e6;
      --text: #1a1a24;
      --text-muted: #5a5a6a;
      --border: rgba(0, 0, 0, 0.12);
      --shadow: 0 20px 60px rgba(255, 122, 0, 0.2);
      --shadow-lg: 0 35px 80px rgba(255, 122, 0, 0.25);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html { font-size: 16px; scroll-behavior: smooth; }
    html, body { height: 100%; width: 100%; overflow-x: hidden; }

    body {
      font-family: "Cairo", "Segoe UI", Tahoma, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(255, 180, 0, 0.25), transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(255, 122, 0, 0.25), transparent 50%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      z-index: -2;
    }

    h1, h2, h3 {
      text-align: center;
      line-height: 1.2;
    }

    #price {
      font-size: clamp(24px, 7vw, 36px);
      font-weight: 900;
      padding: clamp(24px, 6vw, 36px);
      border-radius: 18px;
      background: var(--surface-2);
      border: 3px solid var(--accent);
      color: var(--text);
      box-shadow:
        inset 0 0 30px rgba(255, 180, 0, 0.15),
        0 12px 40px rgba(0, 0, 0, 0.4),
        0 0 40px rgba(255, 180, 0, 0.2);
      word-wrap: break-word;
      letter-spacing: -0.5px;
      position: relative;
      z-index: 2;
    }

    #remaining {
      font-size: clamp(16px, 4vw, 20px);
      font-weight: 700;
      color: var(--text-muted);
      padding: 12px;
    }

    .box {
      width: 100%;
      max-width: 420px;
      min-height: 380px;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: clamp(32px, 8vw, 48px);
      margin: 0 auto;
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(25px) saturate(200%);
      -webkit-backdrop-filter: blur(25px) saturate(200%);
      position: relative;
      animation: bounceIn 0.9s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 24px;
    }

    #google_translate_element,
    .goog-te-banner-frame,
    .goog-te-menu-frame,
    .goog-te-balloon-frame,
    .goog-te-gadget,
    .goog-logo-link,
    .goog-te-gadget span,
    .skiptranslate,
    .goog-te-combo,
    .VIpgJd-ZVi9od-ORHb-OEVmkb svg,
    [aria-label*="Google"],
    [title*="Google"] {
      display: none !important;
      visibility: hidden !important;
      opacity: 0 !important;
      height: 0 !important;
      width: 0 !important;
      overflow: hidden !important;
      position: absolute !important;
      z-index: -9999 !important;
    }

    .box::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      padding: 2px;
      background: var(--gradient-accent);
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0.7;
      pointer-events: none;
    }

    #paypal-button-container {
      position: relative;
      z-index: 2;
      min-height: 60px;
    }

    @keyframes bounceIn {
      0% { opacity: 0; transform: scale(0.8) translateY(40px); }
      50% { transform: scale(1.05); }
      70% { transform: scale(0.98) translateY(-5px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.3s !important;
      }
    }
  </style>
</head>

<body>

  <div class="box">
    <h2 id="price"></h2>
    <h3 id="remaining"></h3>
    <div id="paypal-button-container"></div>
  </div>
  <script>

    const bookingData = JSON.parse(localStorage.getItem("bookingData"));

    if (!bookingData) {

      alert("لا توجد بيانات حجز، سيتم تحويلك للرئيسية");

      window.location.href = "index.html";

    }

    document.getElementById("price").textContent =

      "المبلغ المطلوب: " +

      Number(bookingData.amountToPay).toLocaleString() +

      " جنيه";

    document.getElementById("remaining").textContent =

      "المتبقي للدفع في الفندق: " +

      Number(bookingData.remaining).toLocaleString() +

      " جنيه";

  </script>
  
  <script src="https://www.paypal.com/sdk/js?client-id=AYS3gkFiNwEfBet42COzLsNCyFMxcP4HLJL8jwlJfU6LilUy5IgkyI9-Lx9DuVRx25iZG653KEU02Kom&currency=USD&intent=capture"></script>
  
  <script>

    paypal.Buttons({

      createOrder: async function () {

        const bookingData = JSON.parse(localStorage.getItem("bookingData"));

        const res = await fetch("/api/create-paypal-order", {

          method: "POST",

          headers: { "Content-Type": "application/json" },

          body: JSON.stringify({ amount: bookingData.amountToPay })

        });

        const data = await res.json();

        return data.id;

      },

      onApprove: async function (data) {

        const res = await fetch("/api/capture-paypal-order", {

          method: "POST",

          headers: { "Content-Type": "application/json" },

          body: JSON.stringify({ orderId: data.orderID })

        });

        const capture = await res.json();

        if (capture.status === "COMPLETED") {

          window.location.href = "/success.html";

        } else {

          alert("فشل الدفع");

        }

      },

      onError: function (err) {

        console.error(err);

        alert("حدث خطأ أثناء الدفع");

      }

    }).render("#paypal-button-container");

  </script>   
  <script src="translate.js"></script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
<script>
if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js")
        .then(() => console.log("Service Worker Registered"))
        .catch(err => console.log(err));
    });
}
</script>
  
</body>
</html>
