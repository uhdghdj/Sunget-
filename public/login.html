  <style>
/* ================== HOTEL DETAILS - SUNGET.COM ================== */

/* ---------- THEME VARIABLES ---------- */
:root,
[data-theme="dark"] {
  --bg: #0b0b0f;
  --bg-2: #14141c;
  --surface: #1a1a24;
  --surface-2: #20202c;
  --text: #ffffff;
  --text-muted: #b8b8c4;
  --border: rgba(255, 255, 255, 0.08);
  --accent: #ffb400;
  --accent-2: #ff7a00;
  --danger: #e63946;
  --success: #27b82e;
  --shadow: 0 10px 30px rgba(2, 1, 1, 0.45);
  --radius: 14px;
  --header-h: 80px;
}

[data-theme="light"] {
  --bg: #f7f7fb;
  --bg-2: #ffffff;
  --surface: #ffffff;
  --surface-2: #f1f1f7;
  --text: #1a1a24;
  --text-muted: #555566;
  --border: rgba(0, 0, 0, 0.08);
  --accent: #ff8a00;
  --accent-2: #ff5e00;
  --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
}

/* ================== GOOGLE TRANSLATE - COMPLETE HIDE ================== */
#google_translate_element,
.goog-te-banner-frame,
.goog-te-menu-frame,
.goog-te-balloon-frame,
.goog-te-gadget,
.goog-logo-link,
.goog-te-gadget span,
.skiptranslate,
.goog-te-combo,
.VIpgJd-ZVi9od-ORHb-OEVmkb svg,
[aria-label*="Google"],
[title*="Google"] {
  display: none !important;
  visibility: hidden !important;
  opacity: 0 !important;
  height: 0 !important;
  width: 0 !important;
  overflow: hidden !important;
  position: absolute !important;
  z-index: -9999 !important;
}

body {
  top: 0 !important;
  padding-top: 0 !important;
  margin-top: 0 !important;
}

.goog-text-highlight,
.goog-te-modal,
.goog-te-menu-value {
  display: none !important;
}

/* ---------- RESET & BASE ---------- */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Cairo", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 0.3s ease, color 0.3s ease;
}

html[dir="rtl"] { direction: rtl; text-align: right; }

/* ---- HEADER ---- */
.hotel-header {
  background: linear-gradient(135deg, rgba(11,11,15,0.95), rgba(26,26,36,0.95));
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 25px 5%;
  text-align: center;
  position: relative;
  box-shadow: var(--shadow);
}
.hotel-header::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  opacity: 0.1;
  z-index: 0;
}
.hotel-header h1 {
  font-size: clamp(28px, 6vw, 42px);
  font-weight: 800;
  margin-bottom: 8px;
  position: relative;
  z-index: 1;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: -0.5px;
}
.hotel-header .header-meta {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
  margin-top: 6px;
}
.header-stars { color: var(--accent); font-size: 20px; letter-spacing: 2px; }
.header-badge {
  background: rgba(255,180,0,0.15);
  border: 1px solid rgba(255,180,0,0.3);
  color: var(--accent);
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 700;
}

/* ---- SLIDER ---- */
.slider-wrap { max-width: 1100px; margin: 30px auto 0; padding: 0 5%; }
.slider {
  position: relative;
  overflow: hidden;
  height: 450px;
  border-radius: var(--radius);
  direction: ltr;
  background: linear-gradient(135deg, var(--surface-2), var(--surface));
  box-shadow: var(--shadow);
}
.slider::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 30% 30%, rgba(255,180,0,0.08), transparent 60%),
              radial-gradient(circle at 70% 70%, rgba(255,122,0,0.06), transparent 60%);
  pointer-events: none;
  z-index: 0;
}
.slider .empty-state {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: var(--text-muted);
  font-size: 15px;
  z-index: 1;
}
.slider .empty-state i { font-size: 40px; color: var(--accent); opacity: .8; }
.slides {
  display: flex;
  flex-wrap: nowrap;
  height: 100%;
  width: 100%;
  transition: transform 0.5s ease;
  will-change: transform;
}
.slides img {
  width: 100%;
  height: 100%;
  flex: 0 0 100%;
  object-fit: cover;
  user-select: none;
  -webkit-user-drag: none;
  pointer-events: none;
}
.nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 50px; height: 50px;
  border-radius: 50%;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.25);
  color: #fff;
  font-size: 22px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
}
.nav.prev { left: 15px; }
.nav.next { right: 15px; }
.nav:hover { background: var(--accent); color: #000; transform: translateY(-50%) scale(1.1); }
.dots { display: flex; gap: 8px; justify-content: center; padding: 18px 0 4px; }
.dots span {
  width: 12px; height: 12px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  cursor: pointer;
  transition: all 0.3s ease;
  display: inline-block;
}
.dots span.active, .dots span:hover { background: var(--accent); transform: scale(1.2); }

/* ---- ACTION BUTTONS ---- */
.book-wrap {
  padding: 0 5%;
  margin: 20px 0 40px;
  display: flex;
  justify-content: center;
  gap: 14px;
  flex-wrap: wrap;
}
.book-btn {
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: #000;
  font-weight: 700;
  font-size: 18px;
  padding: 16px 40px;
  border-radius: 50px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 10px 25px rgba(255,180,0,0.35);
  transition: all 0.3s ease;
  border: none;
  cursor: pointer;
}
.book-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(255,180,0,0.45); }

#contactHotelBtn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 16px 30px;
  background: var(--surface);
  color: var(--text);
  text-decoration: none;
  font-weight: 700;
  font-size: 16px;
  border-radius: 50px;
  border: 2px solid var(--border);
  transition: all .3s ease;
}
#contactHotelBtn:hover { background: linear-gradient(135deg,var(--accent),var(--accent-2)); color:#000; border-color:var(--accent); }

/* ---- DYNAMIC SECTIONS ---- */
.dyn-section {
  max-width: 900px;
  margin: 0 auto 60px;
  padding: 0 5%;
}
.dyn-section h2 {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 20px;
  text-align: center;
  position: relative;
}
.dyn-section h2::after {
  content: "";
  display: block;
  width: 60px;
  height: 4px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  border-radius: 2px;
  margin: 10px auto 0;
}

/* Info grid */
.info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}
.info-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 18px;
  transition: .3s;
}
.info-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.info-card .ic-label {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.info-card .ic-label i { color: var(--accent); }
.info-card .ic-value { font-size: 15px; font-weight: 600; word-break: break-word; }
.info-card .ic-value a {
  color: var(--accent);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.info-card .ic-value a:hover { text-decoration: underline; }

/* Description */
.desc-text {
  font-size: 16px;
  line-height: 1.9;
  color: var(--text-muted);
  text-align: center;
  max-width: 700px;
  margin: 0 auto;
  padding: 0 20px;
}

/* Chips */
.chips-wrap { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; padding: 10px 0; }
.chip {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 30px;
  padding: 8px 18px;
  font-size: 14px;
  font-weight: 600;
  transition: .3s;
  cursor: default;
}
.chip:hover { background: var(--surface-2); border-color: var(--accent); }
.chip.accent { background: rgba(255,180,0,0.12); border-color: rgba(255,180,0,0.3); color: var(--accent); }

/* Amenities grid */
.amenities { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 20px 0; }
.amenity {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 12px;
  text-align: center;
  font-weight: 600;
  font-size: 14px;
  transition: all 0.3s ease;
  cursor: default;
}
.amenity:hover { background: var(--surface-2); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); border-color: var(--accent); }

/* Policies */
.policies-list { display: flex; flex-direction: column; gap: 12px; }
.policy-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  transition: .3s;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.policy-item:hover { border-color: var(--accent); transform: translateY(-2px); }
.policy-item i { color: var(--accent); margin-top: 2px; flex-shrink: 0; }

/* Map button */
.map-section { max-width: 900px; margin: 0 auto 60px; padding: 0 5%; text-align: center; }
.map-btn {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  background: var(--surface);
  color: var(--text);
  padding: 16px 30px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 16px;
  border: 2px solid var(--border);
  transition: all 0.3s ease;
  text-decoration: none;
}
.map-btn:hover { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #000; transform: translateY(-2px); box-shadow: 0 10px 25px rgba(255,180,0,0.35); border-color: var(--accent); }

/* WhatsApp button */
.wa-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: #25D366;
  color: #fff;
  padding: 10px 20px;
  border-radius: 30px;
  font-weight: 700;
  font-size: 14px;
  text-decoration: none;
  transition: .3s;
}
.wa-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(37,211,102,0.4); }

/* Social links row */
.social-row { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; padding: 10px 0; }
.social-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 20px;
  border-radius: 30px;
  font-weight: 700;
  font-size: 14px;
  text-decoration: none;
  transition: .3s;
}
.social-btn:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }

/* Boolean badges */
.bool-yes { color: var(--success); font-weight: 700; }
.bool-no { color: var(--danger); font-weight: 700; }

/* ---- REVIEWS SECTION ---- */
.reviews-section { max-width: 960px; margin: 0 auto 60px; padding: 0 5%; }
.reviews-inner { display: flex; flex-direction: column; gap: 28px; }
.rating-summary { display: flex; gap: 30px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; align-items: center; }
.rs-score-box { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; }
.rs-score { font-size: 56px; font-weight: 800; background: linear-gradient(135deg, #003580, #0057b7); color: #fff; width: 90px; height: 90px; border-radius: 14px 14px 14px 0; display: flex; align-items: center; justify-content: center; }
.rs-label { font-size: 15px; font-weight: 700; color: var(--text); }
.rs-count { font-size: 13px; color: var(--text-muted); }
.rs-bars { flex: 1; display: flex; flex-direction: column; gap: 10px; }
.rs-bar-row { display: flex; align-items: center; gap: 10px; }
.rs-bar-label { font-size: 13px; color: var(--text-muted); min-width: 80px; text-align: left; }
.rs-bar-track { flex: 1; height: 8px; background: var(--surface-2); border-radius: 4px; overflow: hidden; }
.rs-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(135deg, #003580, #0057b7); transition: width 0.6s ease; }
.rs-bar-val { font-size: 13px; font-weight: 700; color: var(--text); min-width: 28px; text-align: center; }
.reviews-head { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
.reviews-head h2 { font-size: 24px; font-weight: 800; position: relative; }
.reviews-head h2::after { content: ""; display: block; width: 50px; height: 3px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); border-radius: 2px; margin-top: 8px; }
.write-review-btn { display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #000; font-weight: 700; font-size: 14px; font-family: "Cairo", sans-serif; padding: 10px 20px; border-radius: 30px; border: none; cursor: pointer; transition: 0.3s; white-space: nowrap; }
.write-review-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255,138,0,0.4); }
.review-form-wrap { animation: popIn 0.25s ease; }
.review-form { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; display: flex; flex-direction: column; gap: 18px; }
.review-form h3 { font-size: 20px; font-weight: 800; }
.rf-stars-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.rf-cat { font-size: 14px; font-weight: 700; color: var(--text-muted); }
.star-picker { display: flex; gap: 4px; }
.star-picker span { font-size: 28px; color: var(--border); cursor: pointer; transition: color 0.15s, transform 0.15s; line-height: 1; }
.star-picker span.active, .star-picker span:hover { color: #ffb400; transform: scale(1.15); }
.rf-score-display { font-size: 18px; font-weight: 800; color: var(--accent); min-width: 56px; }
.rf-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
.rf-sub { display: flex; flex-direction: column; gap: 6px; }
.rf-sub label { font-size: 13px; font-weight: 700; color: var(--text-muted); }
.rf-sub select { background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; font-family: "Cairo", sans-serif; font-size: 14px; color: var(--text); outline: none; cursor: pointer; transition: 0.2s; }
.rf-sub select:focus { border-color: var(--accent); }
.rf-trip { display: flex; flex-direction: column; gap: 10px; }
.rf-trip label { font-size: 13px; font-weight: 700; color: var(--text-muted); }
.trip-types { display: flex; flex-wrap: wrap; gap: 8px; }
.trip-type-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface-2); color: var(--text-muted); font-family: "Cairo", sans-serif; font-size: 13px; cursor: pointer; transition: 0.2s; }
.trip-type-btn.active, .trip-type-btn:hover { background: var(--accent); color: #000; border-color: transparent; font-weight: 700; }
.review-form textarea { background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; font-family: "Cairo", sans-serif; font-size: 14px; color: var(--text); outline: none; resize: vertical; transition: 0.2s; }
.review-form textarea:focus { border-color: var(--accent); }
.rf-pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.rf-actions { display: flex; gap: 12px; justify-content: flex-end; }
.rf-cancel { padding: 10px 20px; border-radius: 30px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-family: "Cairo", sans-serif; font-size: 14px; cursor: pointer; transition: 0.2s; }
.rf-cancel:hover { background: var(--surface-2); }
.rf-submit { display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #000; font-weight: 700; font-family: "Cairo", sans-serif; font-size: 14px; padding: 10px 24px; border-radius: 30px; border: none; cursor: pointer; transition: 0.3s; }
.rf-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255,138,0,0.4); }
.reviews-list { display: flex; flex-direction: column; gap: 16px; }
.reviews-loading { text-align: center; padding: 40px; color: var(--text-muted); display: flex; align-items: center; justify-content: center; gap: 10px; }
.review-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; display: flex; flex-direction: column; gap: 14px; transition: 0.2s; }
.review-card:hover { border-color: rgba(255,180,0,0.3); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
.rc-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
.rc-user { display: flex; align-items: center; gap: 12px; }
.rc-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-2)); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; color: #000; flex-shrink: 0; }
.rc-user-info .rc-name { font-size: 15px; font-weight: 700; }
.rc-user-info .rc-meta { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.rc-trip-badge { background: var(--surface-2); padding: 2px 8px; border-radius: 10px; font-size: 11px; }
.rc-score-box { display: flex; flex-direction: column; align-items: center; gap: 3px; flex-shrink: 0; }
.rc-score { background: linear-gradient(135deg, #003580, #0057b7); color: #fff; font-size: 18px; font-weight: 800; padding: 6px 10px; border-radius: 8px 8px 8px 0; min-width: 42px; text-align: center; }
.rc-score-label { font-size: 11px; color: var(--text-muted); }
.rc-title { font-size: 16px; font-weight: 700; }
.rc-comment { font-size: 14px; color: var(--text-muted); line-height: 1.7; }
.rc-pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.rc-pro, .rc-con { font-size: 13px; padding: 10px 14px; border-radius: 10px; }
.rc-pro { background: rgba(39,184,46,0.1); border: 1px solid rgba(39,184,46,0.2); color: var(--success); }
.rc-con { background: rgba(230,57,70,0.08); border: 1px solid rgba(230,57,70,0.15); color: var(--danger); }
.rc-sub-ratings { display: flex; flex-wrap: wrap; gap: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.rc-sub-item { display: flex; flex-direction: column; align-items: center; gap: 3px; min-width: 60px; }
.rc-sub-item .sub-label { font-size: 11px; color: var(--text-muted); }
.rc-sub-item .sub-val { font-size: 13px; font-weight: 700; color: var(--text); }
.rc-provider-reply { background: var(--surface-2); border-radius: 10px; padding: 14px; border-right: 3px solid var(--accent); font-size: 13px; }
.rc-provider-reply .reply-label { font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 6px; }
.no-reviews { text-align: center; padding: 50px 20px; color: var(--text-muted); display: flex; flex-direction: column; align-items: center; gap: 12px; }

/* ---- CHAT ---- */
.chat-section { max-width: 700px; margin: 0 auto 80px; background: var(--surface); border-radius: var(--radius); padding: 40px; box-shadow: var(--shadow); border: 1px solid var(--border); }
.chat-section h2 { font-size: 28px; font-weight: 700; margin-bottom: 20px; text-align: center; position: relative; }
.chat-section h2::after { content: ""; display: block; width: 60px; height: 4px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); border-radius: 2px; margin: 10px auto 0; }
.chat-box { background: var(--surface-2); border-radius: 16px; height: 400px; padding: 20px; overflow-y: auto; margin-bottom: 20px; border: 1px solid var(--border); }

      { key: "pol_prepayment_pct",  label: "نسبة الدفع المسبق",          section: "سياسات الفندق", type: "number", icon: "fa-percent" },

      /* ── Section: اللغات ── */
      { key: "languages", label: "اللغات المتاحة", section: "اللغات المتاحة", type: "chips", icon: "fa-language" },

      /* ── Section: طريقة الدفع ── */
      { key: "payment_method", label: "طريقة الدفع", section: "معلومات الدفع", type: "text", icon: "fa-credit-card", map: { booking_payments: "عبر الإنترنت (عند الحجز)", credit_card_on_site: "بطاقة ائتمان في الموقع عند الوصول" } },
      { key: "payment_type",   label: "نوع الدفع",   section: "معلومات الدفع", type: "text", icon: "fa-wallet" },

      /* ── Fields shown in summary / hidden from dynamic render ── */
      { key: "price_per_night", label: "السعر لليلة", section: "معلومات الفندق", type: "price", icon: "fa-tag" },
      { key: "rating",          label: "التقييم",      section: "معلومات الفندق", type: "number", icon: "fa-star" },

      /* ── Internal fields – always skip ── */
      { key: "id",         section: "_hidden", type: "hidden" },
      { key: "owner_id",   section: "_hidden", type: "hidden" },
      { key: "created_at", section: "_hidden", type: "hidden" },
      { key: "updated_at", section: "_hidden", type: "hidden" },
      { key: "is_active",  section: "_hidden", type: "hidden" },
      { key: "is_approved",section: "_hidden", type: "hidden" },
      { key: "status",     section: "_hidden", type: "hidden" },
      { key: "policies",   section: "_hidden", type: "hidden" },  // legacy text field
      { key: "cancellation_policy", section: "_hidden", type: "hidden" }, // legacy
    ];

    /* Build quick-lookup maps */
    const SCHEMA_MAP = {};
    FIELD_SCHEMA.forEach(f => SCHEMA_MAP[f.key] = f);

    /* Sections order for display */
    const SECTION_ORDER = [
      "وصف الفندق",
      "المرافق",
      "الموقع",
      "معلومات الاتصال",
      "التواصل الاجتماعي",
      "تفاصيل الإقامة",
      "الخدمات",
      "مواعيد الوصول والمغادرة",
      "سياسة الإلغاء",
      "سياسات الفندق",
      "اللغات المتاحة",
      "معلومات الدفع",
      "معلومات الفندق",
    ];

    /* =====================================================================
       RENDERER HELPERS
    ===================================================================== */
    function isEmpty(val) {
      if (val === null || val === undefined || val === "") return true;
      if (Array.isArray(val) && val.length === 0) return true;
      return false;
    }

    function renderValue(fieldDef, value, data) {
      if (!fieldDef) return escHtml(String(value));
      const { type, map, icon } = fieldDef;

      // Apply value mapping if defined
      const resolved = (map && map[value]) ? map[value] : null;

      switch (type) {
        case "hidden": return null;

        case "stars": {
          const n = parseInt(value);
          if (!n) return escHtml(String(value));
          return "★".repeat(n) + "☆".repeat(Math.max(0, 5 - n));
        }

        case "email":
          return `<a href="mailto:${escAttr(value)}"><i class="fa-solid fa-envelope"></i> ${escHtml(value)}</a>`;

        case "tel":
          return `<a href="tel:${escAttr(value)}"><i class="fa-solid fa-phone"></i> ${escHtml(value)}</a>`;

        case "whatsapp": {
          const num = String(value).replace(/\D/g, "");
          return `<a href="https://wa.me/${num}" target="_blank" class="wa-btn"><i class="fa-brands fa-whatsapp"></i> ${escHtml(value)}</a>`;
        }

        case "url":
          return `<a href="${escAttr(value)}" target="_blank" rel="noopener"><i class="fa-solid fa-arrow-up-right-from-square"></i> ${escHtml(value)}</a>`;

        case "social":
          return `<a href="${escAttr(value)}" target="_blank" rel="noopener" class="social-btn" style="color:${fieldDef.color||'inherit'}"><i class="${escAttr(fieldDef.icon||'fa-solid fa-link')}"></i> ${escHtml(fieldDef.label)}</a>`;

        case "boolean":
          return value ? '<span class="bool-yes">✅ نعم</span>' : '<span class="bool-no">❌ لا</span>';

        case "yesno":
          return resolved ? `<span class="bool-yes">✅ ${resolved}</span>` : `<span class="bool-no">❌ ${escHtml(String(value))}</span>`;

        case "policy":
          return resolved ? escHtml(resolved) : escHtml(String(value));

        case "price": {
          const unit = data.area_unit || "USD";
          return `${parseFloat(value).toLocaleString("ar")} ${unit === "m2" ? "م²" : unit === "ft2" ? "قدم²" : "$US"}`;
        }

        case "number":
          if (fieldDef.key === "area_size") {
            const u = data.area_unit;
            const uLabel = u === "ft2" ? "قدم مربع" : "متر مربع";
            return `${parseFloat(value).toLocaleString("ar")} ${uLabel}`;
          }
          return String(value);

        case "time":
          return escHtml(String(value));

        case "chips":
        case "images":
          return null; // handled separately

        case "json":
          try {
            const obj = typeof value === "string" ? JSON.parse(value) : value;
            if (Array.isArray(obj))
              return obj.map(o => `<span class="chip">${escHtml(typeof o === "object" ? JSON.stringify(o) : String(o))}</span>`).join(" ");
            return `<pre style="font-size:12px;color:var(--text-muted);white-space:pre-wrap">${escHtml(JSON.stringify(obj, null, 2))}</pre>`;
          } catch { return escHtml(String(value)); }

        default:
          return resolved ? escHtml(resolved) : escHtml(String(value));
      }
    }

    function escHtml(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }
    function escAttr(s) {
      return String(s).replace(/"/g,"&quot;");
    }

    /* =====================================================================
       DYNAMIC SECTION BUILDER
    ===================================================================== */
    function buildDynamicContent(data) {
      const container = document.getElementById("dynamicContent");
      if (!container) return;

      // Group fields by section
      const sections = {};

      // 1. Known schema fields
      FIELD_SCHEMA.forEach(def => {
        if (def.section.startsWith("_")) return; // special / hidden
        const val = data[def.key];
        if (isEmpty(val)) return;
        if (!sections[def.section]) sections[def.section] = [];
        sections[def.section].push({ def, val });
      });

      // 2. Unknown fields (in DB but not in schema) → catch-all section
      const knownKeys = new Set(FIELD_SCHEMA.map(f => f.key));
      Object.keys(data).forEach(key => {
        if (knownKeys.has(key)) return;
        const val = data[key];
        if (isEmpty(val)) return;
        if (!sections["بيانات إضافية"]) sections["بيانات إضافية"] = [];
        sections["بيانات إضافية"].push({
          def: { key, label: key, type: "text", icon: "fa-circle-info" },
          val
        });
      });

      // Build HTML in section order, then unknown sections
      const orderedSections = [
        ...SECTION_ORDER.filter(s => sections[s]),
        ...Object.keys(sections).filter(s => !SECTION_ORDER.includes(s))
      ];

      let html = "";
      orderedSections.forEach(sectionName => {
        const items = sections[sectionName];
        if (!items || !items.length) return;

        html += `<section class="dyn-section"><h2>${escHtml(sectionName)}</h2>`;

        // ── Special render: description paragraph ──
        if (sectionName === "وصف الفندق") {
          const descItem = items.find(i => i.def.key === "description");
          if (descItem) {
            html += `<p class="desc-text">${escHtml(String(descItem.val))}</p>`;
          }
          html += "</section>";
          return;
        }

        // ── Special render: amenities grid ──
        if (sectionName === "المرافق") {
          const amenItem = items.find(i => i.def.key === "amenities");
          if (amenItem) {
            const arr = normalizeArray(amenItem.val);
            html += `<div class="amenities">${arr.map(a => `<span class="amenity">${escHtml(a)}</span>`).join("")}</div>`;
          }
          html += "</section>";
          return;
        }

        // ── Special render: social links row ──
        if (sectionName === "التواصل الاجتماعي") {
          html += `<div class="social-row">`;
          items.forEach(({ def, val }) => {
            html += `<a href="${escAttr(val)}" target="_blank" rel="noopener" class="social-btn" style="color:${def.color||'inherit'}">
              <i class="${escAttr(def.icon||'fa-solid fa-link')}"></i> ${escHtml(def.label)}
            </a>`;
          });
          html += `</div></section>`;
          return;
        }

        // ── Special render: chips-only sections ──
        if (sectionName === "اللغات المتاحة") {
          const langItem = items.find(i => i.def.key === "languages");
          if (langItem) {
            const arr = normalizeArray(langItem.val);
            html += `<div class="chips-wrap">${arr.map(l => `<span class="chip accent">${escHtml(l)}</span>`).join("")}</div>`;
          }
          html += "</section>";
          return;
        }

        // ── Special render: مواعيد الوصول والمغادرة ──
        if (sectionName === "مواعيد الوصول والمغادرة") {
          const get = k => items.find(i => i.def.key === k)?.val || "—";
          html += `<div class="policies-list">
            <div class="policy-item"><i class="fa-solid fa-arrow-right-to-bracket"></i><div><strong>تسجيل الوصول:</strong> من ${escHtml(get("pol_checkin_from"))} حتى ${escHtml(get("pol_checkin_until"))}</div></div>
            <div class="policy-item"><i class="fa-solid fa-arrow-right-from-bracket"></i><div><strong>تسجيل المغادرة:</strong> من ${escHtml(get("pol_checkout_from"))} حتى ${escHtml(get("pol_checkout_until"))}</div></div>
          </div></section>`;
          return;
        }

        // ── Special render: policies list ──
        if (sectionName === "سياسات الفندق" || sectionName === "سياسة الإلغاء") {
          html += `<div class="policies-list">`;
          items.forEach(({ def, val }) => {
            const resolved = (def.map && def.map[val]) ? def.map[val] : String(val);
            const iconClass = def.icon || "fa-circle-check";
            const isCancellation = def.key === "pol_cancellation";
            const isBad = isCancellation && val === "no_refund";
            html += `<div class="policy-item">
              <i class="fa-solid ${escAttr(iconClass)}" style="color:${isBad ? 'var(--danger)' : 'var(--accent)'}"></i>
              <div><strong>${escHtml(def.label)}:</strong> ${escHtml(resolved)}</div>
            </div>`;
          });
          html += `</div></section>`;
          return;
        }

        // ── Default render: info-card grid ──
        html += `<div class="info-grid">`;
        items.forEach(({ def, val }) => {
          // Skip chips arrays – render them as chips below grid
          if (def.type === "chips" || def.type === "images") return;

          const rendered = renderValue(def, val, data);
          if (rendered === null) return;
          const icon = def.icon || "fa-circle-info";
          html += `<div class="info-card">
            <div class="ic-label"><i class="fa-solid ${escAttr(icon)}"></i> ${escHtml(def.label)}</div>
            <div class="ic-value">${rendered}</div>
          </div>`;
        });
        html += `</div>`;

        // Chip arrays after the grid
        items.forEach(({ def, val }) => {
          if (def.type !== "chips") return;
          const arr = normalizeArray(val);
          if (!arr.length) return;
          html += `<div style="margin-top:18px"><div class="ic-label" style="text-align:center;margin-bottom:10px;justify-content:center"><i class="fa-solid ${escAttr(def.icon||'fa-tags')}"></i> ${escHtml(def.label)}</div>
            <div class="chips-wrap">${arr.map(c => `<span class="chip">${escHtml(c)}</span>`).join("")}</div></div>`;
        });

        html += "</section>";
      });

      container.innerHTML = html;
    }

    /* Normalize a value to a plain array of strings */
    function normalizeArray(val) {
      if (Array.isArray(val)) return val.map(String);
      if (typeof val === "string" && val.trim()) {
        try {
          const parsed = JSON.parse(val);
          if (Array.isArray(parsed)) return parsed.map(String);
        } catch {}
        return val.split(",").map(s => s.trim()).filter(Boolean);
      }
      return [];
    }

    /* =====================================================================
       SLIDER BUILDER
    ===================================================================== */
    function buildSlider(imagesArray) {
      const slidesEl  = document.querySelector(".slides");
      const dotsEl    = document.querySelector(".dots");
      const sliderEl  = document.querySelector(".slider");
      if (!slidesEl) return;

      if (!imagesArray || !imagesArray.length) {
        slidesEl.innerHTML = "";
        if (dotsEl) dotsEl.innerHTML = "";
        if (sliderEl && !sliderEl.querySelector(".empty-state")) {
          const empty = document.createElement("div");
          empty.className = "empty-state";
          empty.innerHTML = '<i class="fa-solid fa-image"></i><span>لا توجد صور متاحة حالياً</span>';
          sliderEl.appendChild(empty);
        }
        return;
      }

      sliderEl?.querySelector(".empty-state")?.remove();
      slidesEl.innerHTML = imagesArray.map(url => `<img src="${escAttr(url)}" alt="hotel" loading="lazy"/>`).join("");
      if (dotsEl) dotsEl.innerHTML = imagesArray.map((_, i) => `<span class="${i === 0 ? "active" : ""}" data-i="${i}"></span>`).join("");

      let current = 0;
      const total = imagesArray.length;
      const go = i => {
        current = (i + total) % total;
        slidesEl.style.transform = `translateX(-${current * 100}%)`;
        dotsEl?.querySelectorAll("span").forEach((d, idx) => d.classList.toggle("active", idx === current));
      };

      document.querySelector(".nav.prev")?.addEventListener("click", () => go(current - 1));
      document.querySelector(".nav.next")?.addEventListener("click", () => go(current + 1));
      dotsEl?.querySelectorAll("span").forEach(d => d.addEventListener("click", () => go(+d.dataset.i)));
      if (total > 1) setInterval(() => go(current + 1), 5000);
    }

    /* =====================================================================
       HEADER BUILDER
    ===================================================================== */
    function buildHeader(data) {
      document.getElementById("hotelName").textContent = data.hotel_name || "الفندق";

      const starsEl = document.getElementById("hotelStars");
      const n = parseInt(data.stars);
      if (n) {
        starsEl.textContent = "★".repeat(n) + "☆".repeat(Math.max(0, 5 - n));
        starsEl.style.display = "";
      } else {
        starsEl.style.display = "none";
      }

      const typeEl = document.getElementById("hotelType");
      if (data.property_type) {
        typeEl.textContent = data.property_type;
        typeEl.style.display = "";
      }

      document.title = (data.hotel_name || "فندق") + " – تفاصيل";
    }

    /* =====================================================================
       MAP SECTION
    ===================================================================== */
    function buildMap(mapLink) {
      const sec = document.getElementById("mapSection");
      const btn = document.getElementById("mapLink");
      if (mapLink && mapLink.trim()) {
        btn.href = mapLink;
        sec.style.display = "";
      } else {
        sec.style.display = "none";
      }
    }

    /* =====================================================================
       MAIN LOAD
    ===================================================================== */
    async function loadHotel() {
      if (!hotelId) return;
      try {
        const { data, error } = await supabaseClient
          .from("hotels").select("*").eq("id", hotelId).single();

        if (error || !data) {
          document.body.innerHTML = "<div style='text-align:center;padding:80px;font-size:20px'>❌ الفندق غير موجود</div>";
          return;
        }

        // 1. Header
        buildHeader(data);

        // 2. Slider: prefer room photos, fallback to hotel photo_urls
        const { data: roomsData } = await supabaseClient
          .from("rooms")
          .select("id, room_photos ( url, is_cover, position )")
          .eq("hotel_id", hotelId);

        const allPhotos = [];
        (roomsData || []).forEach(r => {
          (r.room_photos || []).forEach(ph => { if (ph && ph.url) allPhotos.push(ph); });
        });
        allPhotos.sort((a, b) => {
          if (!!b.is_cover - !!a.is_cover !== 0) return !!b.is_cover - !!a.is_cover;
          return (a.position ?? 0) - (b.position ?? 0);
        });

        const sliderImages = allPhotos.length
          ? allPhotos.map(p => p.url)
          : normalizeArray(data.photo_urls);

        buildSlider(sliderImages);

        // 3. Dynamic content (all fields from DB)
        buildDynamicContent(data);

        // 4. Map
        buildMap(data.map_link);

      } catch (err) {
        console.error("Load hotel error:", err);
      }
    }

    /* =====================================================================
       CHAT
    ===================================================================== */
    async function loadMessages() {
      if (!hotelId) return;
      const { data } = await supabaseClient
        .from("hotel_messages").select("*")
        .eq("hotel_id", hotelId)
        .order("created_at", { ascending: true });
      if (!data) return;

      const box = document.getElementById("chatBox");
      box.innerHTML = "";
      data.forEach(msg => {
        const p = document.createElement("p");
        const senderText = msg.sender_type === "hotel" ? " الفندق:" : " أنت:";
        p.textContent = senderText + " " + msg.message;
        p.style.textAlign = msg.sender_type === "hotel" ? "left" : "right";
        box.appendChild(p);
      });
      box.scrollTop = box.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById("chatInput");
      const msg = input.value.trim();
      if (!msg || !hotelId) return;
      const { data: userData } = await supabaseClient.auth.getUser();
      if (!userData.user) return alert("يجب تسجيل الدخول");
      const { error } = await supabaseClient.from("hotel_messages").insert([{
        hotel_id: hotelId,
        hotel_name: document.getElementById("hotelName").textContent,
        user_id: userData.user.id,
        message: msg,
        sender_type: "user",
      }]);
      if (error) return console.error(error);
      input.value = "";
      loadMessages();
    }

    document.getElementById("sendMsg").addEventListener("click", sendMessage);
    document.getElementById("chatInput").addEventListener("keydown", e => { if (e.key === "Enter") sendMessage(); });
    document.getElementById("bookNowBtn").addEventListener("click", () => {
      window.location.href = `booking.html?id=${hotelId}`;
    });
    document.getElementById("contactHotelBtn").addEventListener("click", function(e) {
      e.preventDefault();
      document.getElementById("chat-section")?.scrollIntoView({ behavior: "smooth", block: "start" });
    });

    /* =====================================================================
       REVIEWS
    ===================================================================== */
    let selectedRating = 0;
    let selectedTripType = "";

    async function loadReviews() {
      if (!hotelId) return;
      const { data, error } = await supabaseClient
        .from("reviews").select("*")
        .eq("hotel_id", hotelId)
        .eq("is_published", true)
        .order("created_at", { ascending: false });

      const list = document.getElementById("reviewsList");
      if (!list) return;

      if (error || !data || data.length === 0) {
        list.innerHTML = `<div class="no-reviews"><i class="fa-regular fa-star" style="font-size:40px;opacity:0.3"></i><p>لا توجد تقييمات بعد — كن أول من يقيّم!</p></div>`;
        return;
      }

      const avg = v => data.reduce((s, r) => s + (r[v] || 0), 0) / data.length;
      const overall = avg("rating_overall");
      const label = overall >= 9 ? "استثنائي" : overall >= 8 ? "ممتاز" : overall >= 7 ? "جيد جداً" : overall >= 6 ? "جيد" : "مقبول";

      document.getElementById("rsScore").textContent = overall.toFixed(1);
      document.getElementById("rsLabel").textContent = label;
      document.getElementById("rsCount").textContent = `${data.length} تقييم`;

      const bars = [
        { label: "النظافة", key: "rating_cleanliness" },
        { label: "الخدمة",  key: "rating_service" },
        { label: "الموقع",  key: "rating_location" },
        { label: "القيمة",  key: "rating_value" },
        { label: "الراحة",  key: "rating_comfort" },
      ];
      const rsBars = document.getElementById("rsBars");
      if (rsBars) rsBars.innerHTML = bars.map(b => {
        const val = avg(b.key);
        return `<div class="rs-bar-row">
          <span class="rs-bar-label">${b.label}</span>
          <div class="rs-bar-track"><div class="rs-bar-fill" style="width:${val*10}%"></div></div>
          <span class="rs-bar-val">${val > 0 ? val.toFixed(1) : "—"}</span>
        </div>`;
      }).join("");

      const tripLabels = { solo:"منفرد", couple:"زوجين", family:"عائلة", business:"عمل", group:"مجموعة" };
      list.innerHTML = data.map(r => {
        const initials = (r.user_name || r.reviewer_name || "م").charAt(0).toUpperCase();
        const scoreLabel = r.rating_overall >= 9 ? "استثنائي" : r.rating_overall >= 8 ? "ممتاز" : r.rating_overall >= 7 ? "جيد جداً" : "جيد";
        const date = new Date(r.created_at).toLocaleDateString("ar-EG", { year:"numeric", month:"long" });
        const hasSubs = r.rating_cleanliness || r.rating_service || r.rating_location;
        return `<div class="review-card">
          <div class="rc-top">
            <div class="rc-user">
              <div class="rc-avatar">${initials}</div>
              <div class="rc-user-info">
                <div class="rc-name">${r.user_name || r.reviewer_name || "مستخدم"}</div>
                <div class="rc-meta">
                  <span>${date}</span>
                  ${r.trip_type ? `<span class="rc-trip-badge">${tripLabels[r.trip_type]||r.trip_type}</span>` : ""}
                  ${r.stay_nights ? `<span>${r.stay_nights} ليلة</span>` : ""}
                </div>
              </div>
            </div>
            <div class="rc-score-box">
              <div class="rc-score">${r.rating_overall?.toFixed(1)||"—"}</div>
              <div class="rc-score-label">${scoreLabel}</div>
            </div>
          </div>
          ${r.title ? `<div class="rc-title">${r.title}</div>` : ""}
          ${r.comment ? `<div class="rc-comment">${r.comment}</div>` : ""}
          ${(r.pros || r.cons) ? `<div class="rc-pros-cons">
            ${r.pros ? `<div class="rc-pro">👍 ${r.pros}</div>` : ""}
            ${r.cons ? `<div class="rc-con">👎 ${r.cons}</div>` : ""}
          </div>` : ""}
          ${hasSubs ? `<div class="rc-sub-ratings">
            ${r.rating_cleanliness ? `<div class="rc-sub-item"><span class="sub-label">نظافة</span><span class="sub-val">${r.rating_cleanliness}</span></div>` : ""}
            ${r.rating_service ? `<div class="rc-sub-item"><span class="sub-label">خدمة</span><span class="sub-val">${r.rating_service}</span></div>` : ""}
            ${r.rating_location ? `<div class="rc-sub-item"><span class="sub-label">موقع</span><span class="sub-val">${r.rating_location}</span></div>` : ""}
            ${r.rating_value ? `<div class="rc-sub-item"><span class="sub-label">قيمة</span><span class="sub-val">${r.rating_value}</span></div>` : ""}
          </div>` : ""}
          ${r.provider_reply ? `<div class="rc-provider-reply"><div class="reply-label"><i class="fa-solid fa-reply"></i> رد الفندق</div>${r.provider_reply}</div>` : ""}
        </div>`;
      }).join("");
    }

    function toggleReviewForm() {
      const wrap = document.getElementById("reviewFormWrap");
      if (!wrap) return;
      const isHidden = wrap.style.display === "none" || !wrap.style.display;
      wrap.style.display = isHidden ? "block" : "none";
      if (isHidden) wrap.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    function selectTripType(btn) {
      document.querySelectorAll(".trip-type-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      selectedTripType = btn.dataset.type;
    }

    document.addEventListener("DOMContentLoaded", () => {
      const stars = document.querySelectorAll(".star-picker span");
      stars.forEach(star => {
        star.addEventListener("click", () => {
          selectedRating = +star.dataset.v;
          stars.forEach(s => s.classList.toggle("active", +s.dataset.v <= selectedRating));
          document.getElementById("rfScoreDisplay").textContent = `${selectedRating} / 10`;
        });
        star.addEventListener("mouseenter", () => { stars.forEach(s => s.classList.toggle("active", +s.dataset.v <= +star.dataset.v)); });
        star.addEventListener("mouseleave", () => { stars.forEach(s => s.classList.toggle("active", +s.dataset.v <= selectedRating)); });
      });
    });

    async function submitReview() {
      const { data: userData } = await supabaseClient.auth.getUser();
      if (!userData?.user) { alert("يجب تسجيل الدخول لكتابة تقييم"); return; }
      if (!selectedRating) { alert("اختر التقييم العام (1-10)"); return; }
      const comment = document.getElementById("rfComment").value.trim();
      if (!comment) { alert("اكتب تعليقك"); return; }
      const btn = document.querySelector(".rf-submit");
      btn.disabled = true; btn.textContent = "جارٍ النشر...";
      const { error } = await supabaseClient.from("reviews").insert({
        hotel_id: hotelId,
        user_id: userData.user.id,
        user_name: userData.user.user_metadata?.full_name || "مستخدم",
        rating_overall: selectedRating,
        rating_cleanliness: +document.getElementById("rfCleanliness").value || null,
        rating_service: +document.getElementById("rfService").value || null,
        rating_location: +document.getElementById("rfLocation").value || null,
        rating_value: +document.getElementById("rfValue").value || null,
        title: document.getElementById("rfTitle").value.trim() || null,
        comment,
        pros: document.getElementById("rfPros").value.trim() || null,
        cons: document.getElementById("rfCons").value.trim() || null,
        trip_type: selectedTripType || null,
        is_published: true,
      });
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> نشر التقييم';
      if (error) { alert("حدث خطأ: " + error.message); return; }
      document.getElementById("reviewFormWrap").style.display = "none";
      alert("✅ شكراً! تم نشر تقييمك");
      loadReviews();
    }

    /* =====================================================================
       INIT
    ===================================================================== */
    i18next.init({
      lng: localStorage.getItem("lang") || "ar",
      fallbackLng: "en",
      resources: {
        ar: { translation: {
          chat: { title: "الدردشة مع الفندق", placeholder: "اكتب رسالتك...", send: "إرسال", you: " أنت:", hotel: " الفندق:" },
        }},
        en: { translation: {
          chat: { title: "Chat with the hotel", placeholder: "Type your message...", send: "Send", you: " You:", hotel: " Hotel:" },
        }},
      },
    }, function() {
      document.querySelectorAll("[data-i18n]").forEach(el => { el.innerHTML = i18next.t(el.dataset.i18n); });
      document.querySelectorAll("[data-i18n-placeholder]").forEach(el => { el.placeholder = i18next.t(el.dataset.i18nPlaceholder); });
      loadHotel();
      loadMessages();
      loadReviews();
      setInterval(loadMessages, 3000);
    });

    window.addEventListener("load", () => {
      if (window.location.hash === "#chat-section") {
        setTimeout(() => document.getElementById("chat-section")?.scrollIntoView({ behavior: "smooth", block: "start" }), 1500);
      }
    });
    </script>
    <script src="translate.js"></script>
  </body>
</html>
