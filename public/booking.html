
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>احجز غرفتك – Sunget</title>
  <link rel="icon" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <style>
    /* ============================================================
       SUNGET — Booking Page
    ============================================================ */

    :root {
      --bg:        #0b0b0f;
      --bg-2:      #14141c;
      --surface:   #1a1a24;
      --surface-2: #20202c;
      --text:      #ffffff;
      --text-muted:#b8b8c4;
      --border:    rgba(255,255,255,0.08);
      --accent:    #ffb400;
      --accent-2:  #ff7a00;
      --danger:    #e63946;
      --success:   #27b82e;
      --shadow:    0 10px 30px rgba(0,0,0,0.45);
      --radius:    14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Cairo", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 30px 16px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* ── BACK BUTTON ── */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 20px;
      align-self: flex-start;
      transition: color .2s;
    }
    .back-btn:hover { color: var(--accent); }

    /* ── PAGE TITLE ── */
    h1 {
      font-weight: 800;
      text-align: center;
      font-size: clamp(24px, 4vw, 38px);
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 8px;
    }
    .subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 28px;
    }

    /* ── BOOKING CONTAINER ── */
    .booking-container {
      width: 100%;
      max-width: 740px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(22px,4vw,36px);
    }

    /* ── HOTEL NAME BADGE ── */
    .hotel-badge {
      text-align: center;
      font-size: clamp(15px,2.2vw,18px);
      font-weight: 700;
      color: var(--accent);
      padding: 10px 20px;
      margin-bottom: 24px;
      background: var(--surface-2);
      border: 1px solid rgba(255,180,0,.2);
      border-radius: 30px;
      display: inline-block;
    }
    .hotel-badge-wrap { text-align: center; }

    /* ── FORM ── */
    form { display: flex; flex-direction: column; gap: 18px; }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    label {
      font-weight: 700;
      color: var(--text);
      font-size: 13px;
      letter-spacing: .3px;
    }

    input, select, textarea {
      width: 100%;
      padding: 14px 16px;
      font-family: "Cairo", sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      outline: none;
      transition: border-color .3s, box-shadow .3s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255,180,0,.15);
    }
    select option { background: #1a1a24; color: var(--text); }

    /* ── ROOM INFO BOX ── */
    .room-info-box {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      display: none;
      gap: 8px;
      flex-direction: column;
    }
    .room-info-box.visible { display: flex; }
    .room-info-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
    }
    .room-info-row span.val { color: var(--text); }

    /* ── ROOM SLIDER ── */
    .room-slider-wrap {
      position: relative;
      width: 100%;
      overflow: hidden;
      border-radius: 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      display: none;
    }
    .room-slider-wrap.visible { display: block; }
    .room-slider-track {
      display: flex;
      transition: transform .4s ease;
    }
    .room-slider-track img {
      width: 100%;
      flex-shrink: 0;
      height: 220px;
      object-fit: cover;
    }
    .slider-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,.55);
      color: #fff;
      border: none;
      font-size: 26px;
      padding: 6px 14px;
      cursor: pointer;
      z-index: 2;
      border-radius: 8px;
      line-height: 1;
      transition: background .2s;
    }
    .slider-nav:hover { background: rgba(255,180,0,.5); }
    .slider-nav.prev { left: 8px; }
    .slider-nav.next { right: 8px; }
    .slider-counter {
      position: absolute;
      bottom: 10px;
      right: 14px;
      background: rgba(0,0,0,.55);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .no-photos {
      text-align: center;
      padding: 28px;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* ── TOTAL PRICE ── */
    .total-price-box {
      text-align: center;
      font-size: clamp(18px,3vw,26px);
      font-weight: 800;
      padding: 18px;
      background: linear-gradient(135deg, rgba(255,180,0,.08), rgba(255,122,0,.08));
      border: 2px solid var(--accent);
      border-radius: var(--radius);
      color: var(--accent);
    }

    /* ── SUBMIT BUTTON ── */
    #confirmBooking {
      width: 100%;
      padding: 18px 24px;
      font-family: "Cairo", sans-serif;
      font-size: 16px;
      font-weight: 800;
      color: #000;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border: none;
      border-radius: 30px;
      cursor: pointer;
      letter-spacing: .5px;
      transition: all .3s ease;
    }
    #confirmBooking:hover { transform: translateY(-3px); box-shadow: 0 14px 32px rgba(255,180,0,.4); }
    #confirmBooking:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    /* ── MESSAGES ── */
    .msg-box {
      padding: 14px 18px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 14px;
      text-align: center;
      line-height: 1.6;
    }
    .msg-box.error   { background: rgba(230,57,70,.12);  border: 1px solid var(--danger);  color: var(--danger); }
    .msg-box.success { background: rgba(39,184,46,.12);  border: 1px solid var(--success); color: var(--success); }
    .msg-box.info    { background: rgba(255,180,0,.08);  border: 1px solid rgba(255,180,0,.3); color: var(--text-muted); }

    /* ── DIVIDER ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 4px 0;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      body { padding: 20px 12px 50px; }
      .booking-container { padding: 20px 14px; }
      .form-row { grid-template-columns: 1fr; }
    }

/* ── PAYMENT METHODS ── */
.payment-methods {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.payment-option {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  background: var(--surface-2);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  transition: border-color .25s, background .25s, box-shadow .25s;
  user-select: none;
}

.payment-option:hover {
  border-color: rgba(255,180,0,.45);
  background: rgba(255,180,0,.05);
}

.payment-option:has(input:checked) {
  border-color: var(--accent);
  background: rgba(255,180,0,.08);
  box-shadow: 0 0 0 3px rgba(255,180,0,.15);
}

.payment-option input[type=radio] {
  appearance: none;
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border: 2px solid var(--text-muted);
  border-radius: 50%;
  flex-shrink: 0;
  transition: border-color .2s, background .2s;
  position: relative;
}

.payment-option input[type=radio]:checked {
  border-color: var(--accent);
  background: var(--accent);
  box-shadow: inset 0 0 0 4px var(--surface-2);
}

.payment-option .pay-logo {
  width: 36px;
  height: 36px;
  object-fit: contain;
  border-radius: 6px;
  background: #fff;
  padding: 4px;
  flex-shrink: 0;
}

.payment-option .pay-icon {
  font-size: 22px;
  flex-shrink: 0;
}

.payment-option .pay-label {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.payment-option .pay-label strong {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}

.payment-option .pay-label small {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 400;
}

  </style>
</head>

  <script>
    /* ============================================================
       SUPABASE CONFIG
    ============================================================ */
    const sb = supabase.createClient(
      "https://mqvmxqzwvpasdytbpbke.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xdm14cXp3dnBhc2R5dGJwYmtlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjIyODMwMjksImV4cCI6MjA3Nzg1OTAyOX0.jHrxC0IcuWYkSaB2y-guc5tl5dPPWFSoasv3rmjcxuM"
    );

    /* ============================================================
       GLOBALS
    ============================================================ */
    const params         = new URLSearchParams(window.location.search);
    const hotelId        = params.get("id");
    let hotelData        = null;
    let roomsArray       = [];
    let roomPrices       = {};
    let selectedRoomId   = null;
    let bookedRanges     = [];
    let sliderIndex      = 0;
    let sliderImages     = [];

    /* ============================================================
       UTILITIES
    ============================================================ */
    function showMessage(text, type = "info") {
      const el = document.getElementById("message");
      el.innerHTML = `<div class="msg-box ${type}">${text}</div>`;
      if (type !== "error") setTimeout(() => { el.innerHTML = ""; }, 5000);
    }

    function parsePhotoUrls(raw) {
      if (!raw) return [];
      if (Array.isArray(raw)) return raw.filter(Boolean);
      if (typeof raw === "string") {
        try {
          const p = JSON.parse(raw);
          return Array.isArray(p) ? p.filter(Boolean) : [];
        } catch {
          return raw.split(",").map(s => s.trim()).filter(Boolean);
        }
      }
      return [];
    }

    /* ============================================================
       SLIDER
    ============================================================ */
    function renderSlider(imgs) {
      const wrap    = document.getElementById("roomSliderWrap");
      const track   = document.getElementById("sliderTrack");
      const counter = document.getElementById("sliderCounter");
      sliderImages  = imgs;
      sliderIndex   = 0;

      if (!imgs.length) {
        wrap.classList.remove("visible");
        return;
      }

      track.innerHTML = imgs.map(src => `<img src="${src}" alt="صورة الغرفة" />`).join("");
      wrap.classList.add("visible");
      updateSlider();
    }

    function updateSlider() {
      document.getElementById("sliderTrack").style.transform = `translateX(-${sliderIndex * 100}%)`;
      document.getElementById("sliderCounter").textContent  = (sliderIndex + 1) + " / " + sliderImages.length;
    }

    document.getElementById("prevBtn").onclick = () => {
      if (sliderIndex > 0) { sliderIndex--; updateSlider(); }
    };
    document.getElementById("nextBtn").onclick = () => {
      if (sliderIndex < sliderImages.length - 1) { sliderIndex++; updateSlider(); }
    };

    /* ============================================================
       ROOM INFO PANEL
    ============================================================ */
    function showRoomInfo(room) {
      const box = document.getElementById("roomInfoBox");
      if (!room) { box.classList.remove("visible"); return; }

      const showRow = (rowId, valId, val) => {
        const row = document.getElementById(rowId);
        const valEl = document.getElementById(valId);
        if (val) { row.style.display = "flex"; valEl.textContent = val; }
        else { row.style.display = "none"; }
      };

      const cap       = room.max_guests || room.capacity || room.max_adults;
      const type      = room.room_type || room.type;
      const bedType   = room.bed_type || room.bed_types || null;
      const floor     = room.floor != null ? "الطابق " + room.floor : null;
      const view      = room.view || room.room_view || null;
      const size      = room.size_sqm ? room.size_sqm + " م²" : null;
      const amenities = Array.isArray(room.amenities)
        ? room.amenities.join("، ")
        : (typeof room.amenities === "string" ? room.amenities : null);
      const desc      = room.description || null;

      showRow("capacityRow",  "capacityVal",  cap ? cap + " أشخاص" : null);
      showRow("roomTypeRow",  "roomTypeVal",  type);
      showRow("bedTypeRow",   "bedTypeVal",   bedType);
      showRow("floorRow",     "floorVal",     floor);
      showRow("viewRow",      "viewVal",      view);
      showRow("roomSizeRow",  "roomSizeVal",  size);
      showRow("amenitiesRow", "amenitiesVal", amenities);
      showRow("roomDescRow",  "roomDescVal",  desc);

      box.classList.add("visible");
    }

    /* ============================================================
       CALCULATE TOTAL PRICE
    ============================================================ */
    function calculateTotal() {
      const checkIn  = document.getElementById("checkIn").value;
      const checkOut = document.getElementById("checkOut").value;

      if (!checkIn || !checkOut || !selectedRoomId) {
        document.getElementById("totalPrice").textContent = "السعر الإجمالي: 0 جنيه";
        return 0;
      }

      const start  = new Date(checkIn  + "T00:00:00");
      const end    = new Date(checkOut + "T00:00:00");
      const nights = Math.ceil((end - start) / 86400000);

      if (nights <= 0) {
        document.getElementById("totalPrice").textContent = "السعر الإجمالي: 0 جنيه";
        return 0;
      }

      const price = Number(roomPrices[selectedRoomId] || 0);
      const total = price * nights;

      document.getElementById("totalPrice").textContent =
        `السعر الإجمالي: ${total.toLocaleString("ar-EG")} جنيه (${nights} ليلة × ${price.toLocaleString("ar-EG")} جنيه)`;

      return total;
    }

    /* ============================================================
       LOAD BOOKED DATES (internal + external)
    ============================================================ */
    async function loadBookedDates(roomId) {
      bookedRanges = [];
      if (!roomId) return;
      try {
        const [{ data: internal }, { data: external }] = await Promise.all([
          sb.from("bookings").select("check_in,check_out").eq("room_id", roomId).neq("status", "cancelled"),
          sb.from("external_bookings").select("check_in,check_out").eq("room_id", roomId).eq("status", "confirmed"),
        ]);
        const all = [...(internal || []), ...(external || [])];
        bookedRanges = all.map(b => ({ start: new Date(b.check_in), end: new Date(b.check_out) }));
      } catch (err) {
        console.error("loadBookedDates error:", err);
      }
    }

    function isRangeBooked(startDate, endDate) {
      return bookedRanges.some(r => startDate < r.end && endDate > r.start);
    }

    function validateDates() {
      const ci = document.getElementById("checkIn").value;
      const co = document.getElementById("checkOut").value;
      if (!ci || !co) return true;
      const start = new Date(ci), end = new Date(co);
      if (end <= start) {
        showMessage("❌ تاريخ المغادرة يجب أن يكون بعد تاريخ الوصول", "error");
        document.getElementById("checkOut").value = "";
        return false;
      }
      if (isRangeBooked(start, end)) {
        showMessage("❌ هذه الفترة محجوزة بالفعل، اختر تواريخ أخرى", "error");
        document.getElementById("checkIn").value  = "";
        document.getElementById("checkOut").value = "";
        return false;
      }
      return true;
    }

    /* ============================================================
       CHECK CONFLICTS IN DB BEFORE INSERT
    ============================================================ */
    async function checkConflictsBeforeInsert(roomId, checkIn, checkOut) {
      const [{ data: ext }, { data: intr }] = await Promise.all([
        sb.from("external_bookings").select("id").eq("room_id", roomId).eq("status", "confirmed").lt("check_in", checkOut).gt("check_out", checkIn),
        sb.from("bookings").select("id").eq("room_id", roomId).neq("status", "cancelled").lt("check_in", checkOut).gt("check_out", checkIn),
      ]);
      if (ext && ext.length > 0) return { conflict: true, source: "external" };
      if (intr && intr.length > 0) return { conflict: true, source: "internal" };
      return { conflict: false };
    }

    /* ============================================================
       LOAD HOTEL + ROOMS
    ============================================================ */
    async function loadHotel() {
      if (!hotelId) { showMessage("❌ لم يتم تحديد الفندق", "error"); return; }
      showMessage("جارٍ تحميل بيانات الفندق...", "info");

      try {
        const { data: hotel, error: hotelErr } = await sb.from("hotels").select("*").eq("id", hotelId).single();
        if (hotelErr || !hotel) { showMessage("❌ الفندق غير موجود", "error"); return; }
        hotelData = hotel;
        document.title = "حجز – " + hotel.hotel_name + " | Sunget";
        document.getElementById("hotelName").textContent = hotel.hotel_name;

        const { data: rooms, error: roomsErr } = await sb.from("rooms").select("*").eq("hotel_id", hotelId).order("room_type");
        if (roomsErr || !rooms?.length) { showMessage("❌ لا توجد غرف متاحة لهذا الفندق حالياً", "error"); return; }

        roomsArray = rooms;
        const roomSelect = document.getElementById("roomSelect");
        roomSelect.innerHTML = '<option value="">اختر غرفة...</option>';
        roomPrices = {};

        rooms.forEach(room => {
          const price = Number(room.price || room.base_price || 0);
          const label = [
            room.name || room.room_type,
            room.room_number ? "رقم " + room.room_number : null,
            price ? price.toLocaleString("ar-EG") + " جنيه/ليلة" : null,
          ].filter(Boolean).join(" — ");

          const opt = document.createElement("option");
          opt.value              = room.id;
          opt.textContent        = label;
          opt.dataset.photoUrls  = JSON.stringify(parsePhotoUrls(room.photo_urls));
          opt.dataset.roomType   = room.room_type   || "";
          opt.dataset.capacity   = room.max_guests  || room.capacity || room.max_adults || "";
          opt.dataset.sizeSqm    = room.size_sqm    || "";
          opt.dataset.description= room.description || "";
          roomPrices[room.id]    = price;
          roomSelect.appendChild(opt);
        });

        /* Pre-select room from URL param if provided */
        const urlRoomId = params.get("room");
        if (urlRoomId && roomPrices[urlRoomId]) {
          roomSelect.value = urlRoomId;
          roomSelect.dispatchEvent(new Event("change"));
        }

        /* Pre-fill dates from URL */
        const ci = params.get("ci");
        const co = params.get("co");
        if (ci) document.getElementById("checkIn").value  = ci;
        if (co) document.getElementById("checkOut").value = co;
        if (ci || co) calculateTotal();

        showMessage("✅ تم تحميل " + rooms.length + " غرفة بنجاح", "success");

      } catch (err) {
        console.error("loadHotel error:", err);
        showMessage("❌ حدث خطأ في تحميل الصفحة", "error");
      }
    }

    /* ============================================================
       ROOM SELECT CHANGE
    ============================================================ */
    document.getElementById("roomSelect").addEventListener("change", async function () {
      const opt = this.selectedOptions[0];
      selectedRoomId = this.value || null;

      if (!selectedRoomId) {
        renderSlider([]);
        showRoomInfo(null);
        calculateTotal();
        return;
      }

      const room = roomsArray.find(r => r.id === selectedRoomId) || {};
      const imgs = JSON.parse(opt.dataset.photoUrls || "[]");

      renderSlider(imgs);
      showRoomInfo(room);

      await loadBookedDates(selectedRoomId);
      calculateTotal();
      validateDates();
    });

    document.getElementById("checkIn").addEventListener("change",  () => { calculateTotal(); validateDates(); });
    document.getElementById("checkOut").addEventListener("change", () => { calculateTotal(); validateDates(); });

    /* ============================================================
       FORM SUBMIT — CONFIRM BOOKING
    ============================================================ */
    document.getElementById("bookingForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const checkIn       = document.getElementById("checkIn").value;
      const checkOut      = document.getElementById("checkOut").value;
      const guestPhone    = document.getElementById("guestPhone").value.trim();
      const guestCountry  = document.getElementById("guestCountry").value;
      const paymentMethodEl = document.querySelector('input[name="payment_method"]:checked');
      if (!paymentMethodEl) { showMessage("❌ اختر طريقة الدفع", "error"); return; }
      const paymentMethod = paymentMethodEl.value;

      if (!selectedRoomId) { showMessage("❌ اختر غرفة من القائمة", "error"); return; }
      if (!checkIn || !checkOut)  { showMessage("❌ اختر تواريخ الوصول والمغادرة", "error"); return; }
      if (!guestPhone)            { showMessage("❌ أدخل رقم الهاتف", "error"); return; }
      if (!guestCountry)          { showMessage("❌ اختر الدولة", "error"); return; }
      if (!validateDates())        return;

      const total = calculateTotal();
      if (total <= 0) { showMessage("❌ تحقق من التواريخ والسعر", "error"); return; }

      const btn = document.getElementById("confirmBooking");
      btn.disabled    = true;
      btn.textContent = "⏳ جارٍ تأكيد الحجز...";

      try {
        const { data: userData, error: authErr } = await sb.auth.getUser();
        if (authErr || !userData?.user) {
          showMessage("❌ يجب تسجيل الدخول أولاً للحجز", "error");
          btn.disabled = false;
          btn.textContent = "✅ تأكيد الحجز والدفع";
          return;
        }

        const conflict = await checkConflictsBeforeInsert(selectedRoomId, checkIn, checkOut);
        if (conflict.conflict) {
          const msg = conflict.source === "external"
            ? "❌ الغرفة محجوزة من Booking أو Airbnb في هذه الفترة"
            : "❌ الغرفة محجوزة بالفعل في هذه الفترة";
          showMessage(msg, "error");
          await loadBookedDates(selectedRoomId);
          btn.disabled = false;
          btn.textContent = "✅ تأكيد الحجز والدفع";
          return;
        }

        const { data: booking, error: bookingErr } = await sb.from("bookings").insert([{
          hotel_name:    hotelData.hotel_name,
          user_id:       userData.user.id,
          hotel_id:      hotelId,
          room_id:       selectedRoomId,
          check_in:      checkIn,
          check_out:     checkOut,
          guest_phone:   guestPhone,
          guest_country: guestCountry,
          status:        "pending",
          total_price:   total,
          payment_method: paymentMethod === "paymob" ? "paymob" : "hotel",
        }]).select().single();

        if (bookingErr || !booking) {
          showMessage("❌ حدث خطأ في إنشاء الحجز، حاول مجدداً", "error");
          btn.disabled = false;
          btn.textContent = "✅ تأكيد الحجز والدفع";
          return;
        }

        const amountToPay = paymentMethod === "paymob" ? total : Math.round(total * 0.05);
        const remaining   = total - amountToPay;

        localStorage.setItem("bookingData", JSON.stringify({
          bookingId:  booking.id,
          hotel_name: hotelData.hotel_name,
          hotelId,
          roomId:     selectedRoomId,
          checkIn,
          checkOut,
          total,
          amountToPay,
          remaining,
        }));

        showMessage(
          `✅ تم إنشاء الحجز بنجاح!<br>${
            paymentMethod === "paymob"
              ? "سيتم تحويلك للدفع الإلكتروني..."
              : "سيتم دفع عربون 5% الآن والباقي في الفندق"
          }`,
          "success"
        );

        setTimeout(() => {
          window.location.href = "Paypal.html";
        }, 2200);

      } catch (err) {
        console.error("booking error:", err);
        showMessage("❌ حدث خطأ غير متوقع، حاول مجدداً", "error");
        btn.disabled = false;
        btn.textContent = "✅ تأكيد الحجز والدفع";
      }
    });

    /* ============================================================
       INIT
    ============================================================ */
    document.addEventListener("DOMContentLoaded", () => {
      const today = new Date().toISOString().split("T")[0];
      document.getElementById("checkIn").min  = today;
      document.getElementById("checkOut").min = today;
      loadHotel();
    });
  </script>
</body>
</html>
