
<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>الفندق — لوحة تحكم</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <style>
    /* ================== HOTEL DASHBOARD STYLESHEET ================== */

    /* ---------- THEME VARIABLES ---------- */
    :root,
    [data-theme="dark"] {
      --bg: #0b0b0f;
      --bg-2: #14141c;
      --surface: #1a1a24;
      --surface-2: #20202c;
      --text: #ffffff;
      --text-muted: #b8b8c4;
      --border: rgba(255, 255, 255, 0.08);
      --accent: #ffb400;
      --accent-2: #ff7a00;
      --danger: #e63946;
      --success: #27b82e;
      --info: #2563eb;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
      --radius: 14px;
      --sidebar-w: 250px;
      --header-h: 70px;
    }
#withdrawOnlineBtn {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: 12px 24px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 6px 18px rgba(34, 197, 94, 0.25);
}

#withdrawOnlineBtn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 24px rgba(34, 197, 94, 0.4);
}

#withdrawOnlineBtn:active {
  transform: scale(0.97);
}

#withdrawOnlineBtn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  box-shadow: none;
  transform: none;
}
    [data-theme="light"] {
      --bg: #f7f7fb;
      --bg-2: #ffffff;
      --surface: #ffffff;
      --surface-2: #f1f1f7;
      --text: #1a1a24;
      --text-muted: #555566;
      --border: rgba(0, 0, 0, 0.08);
      --accent: #ff8a00;
      --accent-2: #ff5e00;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }
    .send-row button {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #000;
      border: none;
      border-radius: 12px;
      padding: 12px 22px;
      font-size: 14px;
      font-weight: 700;
      min-width: 90px;
      transition: all 0.3s ease;
      box-shadow: 0 6px 18px rgba(255, 138, 0, 0.25);
    }

    .send-row button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(255, 138, 0, 0.4);
    }

    .send-row button:active {
      transform: scale(0.96);
    }

    .send-row button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    /* ---------- RESET ---------- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: "Cairo", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition:
        background 0.3s ease,
        color 0.3s ease;
    }

    a {
      text-decoration: none;
      color: inherit;
    }
    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      outline: none;
    }
    img {
      max-width: 100%;
      display: block;
    }

    /* ================== HEADER ================== */
    header {
      position: sticky;
      top: 0;
      height: var(--header-h);
      background: rgba(11, 11, 15, 0.9);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
    }

    [data-theme="light"] header {
      background: rgba(255, 255, 255, 0.9);
    }

    header h1 {
      font-size: clamp(18px, 2.4vw, 24px);
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    #menuToggle {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      width: 40px;
      height: 40px;
      border-radius: 10px;
      font-size: 20px;
      align-items: center;
      justify-content: center;
    }

    /* ================== LAYOUT ================== */
    .layout {
      display: flex;
      flex: 1;
      min-height: calc(100vh - var(--header-h));
    }

    /* ================== SIDEBAR ================== */
    #sidebar,
    .sidebar {
      width: var(--sidebar-w);
      background: var(--bg-2);
      border-left: 1px solid var(--border);
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      position: sticky;
      top: var(--header-h);
      align-self: flex-start;
      height: calc(100vh - var(--header-h));
      overflow-y: auto;
      z-index: 90;
      transition: transform 0.35s ease;
    }

    #sidebar a,
    .sidebar a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      color: var(--text);
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      transition: 0.25s;
      border: 1px solid transparent;
    }

    #sidebar a:hover,
    .sidebar a:hover {
      background: var(--surface);
      border-color: var(--border);
      color: var(--accent);
      transform: translateX(-4px);
    }

    #sidebar a.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #000;
    }

    #logoutBtn {
      margin-top: auto;
      background: rgba(230, 57, 70, 0.12);
      color: var(--danger) !important;
    }

    #logoutBtn:hover {
      background: var(--danger) !important;
      color: #fff !important;
    }

    /* ================== MAIN CONTENT ================== */
    main,
    .main-content {
      flex: 1;
      padding: 30px 4%;
      min-width: 0;
    }

    h2,
    h3 {
      margin-bottom: 18px;
      font-weight: 700;
    }

    h2 {
      font-size: clamp(20px, 2.6vw, 28px);
      position: relative;
      padding-bottom: 10px;
    }

    h2::after {
      content: "";
      position: absolute;
      bottom: 0;
      right: 0;
      width: 60px;
      height: 3px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: 3px;
    }

    h3 {
      font-size: 18px;
      color: var(--text);
    }
    h4 {
      font-size: 16px;
      margin-bottom: 8px;
    }

    /* ================== FORMS ================== */
    form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-bottom: 30px;
    }

    form label,
    form > p,
    form .full {
      grid-column: 1 / -1;
      font-size: 14px;
      color: var(--text-muted);
    }

    input,
    textarea,
    select {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: 0.3s;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255, 180, 0, 0.15);
    }

    textarea {
      min-height: 90px;
      resize: vertical;
      grid-column: 1 / -1;
    }

    input[type="file"] {
      padding: 8px;
      cursor: pointer;
      grid-column: 1 / -1;
    }

    input[type="date"],
    input[type="time"] {
      color-scheme: dark;
    }
    [data-theme="light"] input[type="date"],
    [data-theme="light"] input[type="time"] {
      color-scheme: light;
    }

    /* ================== BUTTONS ================== */
    button[type="submit"],
    .btn-primary,
    form button:not(.del-btn):not(.edit-btn) {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #000;
      font-weight: 700;
      padding: 12px 22px;
      border-radius: 10px;
      font-size: 14px;
      transition: 0.3s;
    }

    button[type="submit"]:hover,
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(255, 138, 0, 0.35);
    }

    button[type="submit"]:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    #cancelEditBtn,
    #cancelEventBtn {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 12px 22px;
      border-radius: 10px;
      font-weight: 600;
    }

    #cancelEditBtn:hover,
    #cancelEventBtn:hover {
      background: var(--danger);
      color: #fff;
      border-color: var(--danger);
    }

    /* ================== MESSAGES (toast) ================== */
    #msg {
      position: fixed;
      top: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--danger);
      color: #fff;
      padding: 12px 22px;
      border-radius: 30px;
      font-weight: 600;
      z-index: 9999;
      box-shadow: var(--shadow);
      display: none;
      font-size: 14px;
      max-width: 90%;
      text-align: center;
      animation: slideDown 0.3s ease;
    }

    #msg.success {
      background: var(--success);
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translate(-50%, -20px);
      }
      to {
        opacity: 1;
        transform: translate(-50%, 0);
      }
    }

    /* ================== CARDS ================== */
    .dashboard-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      box-shadow: var(--shadow);
      transition:
        transform 0.3s ease,
        box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.35);
    }

    .card b {
      color: var(--accent);
      margin-left: 4px;
    }
    .card p {
      font-size: 14px;
      margin: 4px 0;
      color: var(--text-muted);
    }
    .card h4 {
      color: var(--text);
      margin-bottom: 6px;
    }

    /* ================== HOTEL PHOTOS ================== */
    .hotel-photos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .hotel-photos img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      transition: transform 0.4s ease;
    }

    .hotel-photos img:hover {
      transform: scale(1.04);
    }

    /* صور موجودة في فورم التعديل */
    #existing-photos {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      grid-column: 1 / -1;
    }

    #existing-photos img {
      width: 110px;
      height: 110px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    /* أزرار actions */
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .actions button {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #000;
      font-weight: 700;
      padding: 10px 22px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .actions button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(255, 138, 0, 0.35);
    }

    /* ================== EDIT/DELETE small buttons ================== */
    .edit-btn,
    .del-btn {
      color: #fff;
      font-weight: 600;
      border-radius: 8px;
      transition: 0.25s;
    }

    .edit-btn {
      background: var(--info) !important;
    }
    .edit-btn:hover {
      background: #1e4ed8 !important;
      transform: translateY(-2px);
    }
    .del-btn {
      background: var(--danger) !important;
    }
    .del-btn:hover {
      background: #c1303c !important;
      transform: translateY(-2px);
    }

    /* ================== CHAT ================== */
    #chat-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      margin-top: 20px;
    }

    #chatBox {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      height: 360px;
      overflow-y: auto;
      margin-bottom: 12px;
    }

    #chatBox p {
      background: var(--surface-2);
      padding: 10px 14px;
      border-radius: 12px;
      margin-bottom: 8px !important;
      font-size: 14px;
      max-width: 80%;
      word-wrap: break-word;
      display: inline-block;
      clear: both;
    }

    #chatBox p[style*="left"] {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #000;
      float: left;
    }

    #chatBox p[style*="right"] {
      float: right;
    }

    .chat-input,
    #chat-container > div:last-child {
      display: flex;
      gap: 10px;
    }

    #msgInput {
      flex: 1;
    }

    /* ================== SCROLLBAR ================== */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--surface-2);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent);
    }

    /* ================== RESPONSIVE ================== */
    @media (max-width: 992px) {
      :root {
        --sidebar-w: 220px;
      }
      main,
      .main-content {
        padding: 24px 3%;
      }
    }

    @media (max-width: 768px) {
      #menuToggle {
        display: inline-flex;
      }

      header {
        padding: 0 14px;
      }

      #sidebar,
      .sidebar {
        position: fixed;
        top: var(--header-h);
        right: 0;
        height: calc(100vh - var(--header-h));
        width: 260px;
        transform: translateX(100%);
        box-shadow: var(--shadow);
        z-index: 200;
      }

      #sidebar.active,
      .sidebar.active {
        transform: translateX(0);
      }

      .layout {
        flex-direction: column;
      }
      main,
      .main-content {
        padding: 20px 16px;
        width: 100%;
      }

      form {
        grid-template-columns: 1fr;
        padding: 18px;
      }

      .dashboard-cards {
        grid-template-columns: 1fr 1fr;
      }
      .hotel-photos {
        grid-template-columns: repeat(2, 1fr);
      }
      .hotel-photos img {
        height: 130px;
      }

      #chatBox {
        height: 300px;
      }
    }

    @media (max-width: 480px) {
      :root {
        --header-h: 60px;
      }

      header {
        padding: 0 10px;
      }
      header h1 {
        font-size: 16px;
      }

      main,
      .main-content {
        padding: 16px 12px;
      }

      h2 {
        font-size: 18px;
      }
      h3 {
        font-size: 16px;
      }

      form {
        padding: 14px;
        gap: 10px;
      }
      input,
      textarea,
      select {
        padding: 10px 12px;
        font-size: 13px;
      }

      button[type="submit"],
      .btn-primary,
      #cancelEditBtn,
      #cancelEventBtn,
      .actions button {
        padding: 10px 16px;
        font-size: 13px;
        width: 100%;
      }

      .dashboard-cards {
        grid-template-columns: 1fr;
      }
      .hotel-photos {
        grid-template-columns: 1fr;
      }
      .hotel-photos img {
        height: 200px;
      }

      #existing-photos img {
        width: 90px;
        height: 90px;
      }

      .card {
        padding: 14px;
      }

      #sidebar,
      .sidebar {
        width: 85%;
      }

      #chatBox {
        height: 260px;
      }
      #chatBox p {
        font-size: 13px;
        max-width: 90%;
      }

      #msg {
        top: 75px;
        font-size: 13px;
        padding: 10px 16px;
      }
    }

    @media (max-width: 360px) {
      header h1 {
        font-size: 14px;
      }
      #menuToggle {
        width: 36px;
        height: 36px;
        font-size: 18px;
      }
    }

    /* ================== TRANSITIONS ================== */
    header,
    .card,
    form,
    #sidebar,
    #chat-container {
      transition:
        background 0.35s ease,
        color 0.35s ease,
        border-color 0.35s ease;
    }
    @media (max-width: 768px) {
      #sidebar.active::before {
        content: "";
        position: fixed;
        inset: var(--header-h) 0 0 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: -1;
      }
    }

#wallet-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow);
}

#wallet-section .dashboard-cards {
  margin-bottom: 20px;
}

#withdrawBtn {
  width: 100%;
  padding: 14px 20px;
  border: none;
  border-radius: 12px;
  font-family: inherit;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;

  background: linear-gradient(
    135deg,
    var(--accent),
    var(--accent-2)
  );

  color: #000;

  transition: all 0.3s ease;

  box-shadow: 0 8px 24px rgba(255, 138, 0, 0.3);
}

#withdrawBtn:hover {
  transform: translateY(-3px);

  box-shadow: 0 12px 30px rgba(255, 138, 0, 0.45);
}

#withdrawBtn:active {
  transform: scale(0.97);
}

#withdrawBtn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

  </style>
  <body>
    <header>
      <button id="menuToggle" aria-label="فتح القائمة">☰</button>
      <h2>لوحة تحكم الفندق</h2>
      <div></div>
    </header>

    <div class="layout">
       <nav id="sidebar">
        <a href="#" id="dashBtn"> اللوحة</a>
        <a href="#" id="roomsBtn"> الغرف</a>
        <a href="#" id="notificationsBtn">
           الإشعارات
          <span
            id="notifCount"
            style="
              background: red;
              color: #fff;
              border-radius: 50%;
              padding: 2px 8px;
              font-size: 12px;
              margin-right: auto;
              display: none;
            "
          >
            0
          </span>
        </a>
        <a href="#" id="bookingsBtn"> حجوزاتي</a>
      <input type="number" id="withdrawAmount" placeholder="المبلغ">

<input type="email" id="paypalEmail" placeholder="PayPal Email">

<button id="withdrawBtn">
  سحب الرصيد
</button>

<span id="availableBalance">0</span>
       <a href="#" id="messagesBtn">
   رسائل العملاء
  <span id="msgCount"
    style="
      background:red;
      color:#fff;
      border-radius:50%;
      padding:2px 8px;
      font-size:12px;
      margin-right:auto;
      display:none;
    ">
    0
  </span>
</a>
        <a href="#" id="editBtn"> تعديل البيانات</a>
        <a href="#" id="logoutBtn"> تسجيل الخروج</a>
      </nav>


      <main>
        <div id="msg"></div>

        <!-- نموذج الفندق -->
        <section id="form-container">
          <h2 id="form-title">إضافة الفندق</h2>
          <form id="hotel-form">
            <input id="hotel_name" placeholder="اسم الفندق" required />
            <input id="city" placeholder="المدينة" />
            <input id="governorate" placeholder="المحافظة" />
            <textarea id="description" placeholder="الوصف"></textarea>
            <input id="address" placeholder="العنوان" />
            <input id="map_link" placeholder="رابط الخريطة" />
            <input id="check_in_time" placeholder="وقت الدخول" />
            <input id="check_out_time" placeholder="وقت الخروج" />
            <input id="room_count" type="number" placeholder="عدد الغرف" />
            <input id="room_types" placeholder="أنواع الغرف" />
            <input
              id="price_per_night"
              type="number"
              placeholder="السعر/الليلة"
            />
            <input id="amenities" placeholder="المرافق" />
            <textarea id="policies" placeholder="السياسات"></textarea>

            <label>صور الفندق (يمكن إضافة المزيد عند التعديل):</label>
            <input id="photos" type="file" multiple accept="image/*" />

            <div
              id="existing-photos-wrap"
              style="display: none; margin-top: 10px"
            >
              <label>الصور الحالية (اضغط × للحذف):</label>
              <div id="existing-photos"></div>
            </div>

            <div class="actions">
              <button id="saveBtn" type="submit">حفظ</button>
              <button id="cancelEditBtn" type="button" style="display: none">
                إلغاء
              </button>
            </div>
          </form>
        </section>

        <!-- لوحة العرض -->
        <section id="dashboard-container" style="display: none"></section>

        <!-- الغرف -->
        <section id="rooms-section" style="display: none">
          <h2>إضافة غرفة</h2>
          <form id="room-form">

          const file = files[i];
          const ext = file.name.split(".").pop();
          const path = `${hotelId}/${Date.now()}_${i}.${ext}`;
          const { error } = await supabaseClient.storage
            .from("hotel-photos")
            .upload(path, file);
          if (error) throw error;
          const { data } = supabaseClient.storage
            .from("hotel-photos")
            .getPublicUrl(path);
          urls.push(data.publicUrl);
        }
        return urls;
      }

     async function loadMessages() {

  if (!currentHotelId || !currentChatUserId) return;

  const { data, error } = await supabaseClient
    .from("hotel_messages")
    .select("*")
    .eq("hotel_id", currentHotelId)

    box.appendChild(p);

      async function sendReply() {

        const message = input.value.trim();

        if (!message || !currentHotelId || !currentChatUserId) return;

        const { error } = await supabaseClient.from("hotel_messages").insert([

            hotel_id: currentHotelId,

            user_id: currentChatUserId,

            sender_type: "hotel",

            sender_name: currentChatUserName,

          showMsg(error.message);
          return;
        }

        input.value = "";

        loadMessages();

        });

        // إغلاق عند الضغط على أي رابط داخل الـ sidebar
        sidebarEl.querySelectorAll("a").forEach((link) => {
          link.addEventListener("click", () => {
            if (window.innerWidth <= 768) sidebarEl.classList.remove("active");
          });
        });

        // إغلاق عند الضغط خارج الـ sidebar
        document.addEventListener("click", (e) => {
          if (
            window.innerWidth <= 768 &&
            sidebarEl.classList.contains("active") &&
            !sidebarEl.contains(e.target) &&
            e.target !== menuToggleBtn
          ) {
            sidebarEl.classList.remove("active");
          }
        });

        // إغلاق عند تكبير الشاشة
        window.addEventListener("resize", () => {
          if (window.innerWidth > 768) sidebarEl.classList.remove("active");
        });

async function loadNotifications() {

  if (!currentHotelId) return;

  // إشعارات الجدول
  const { data: dbNotifications } =
    await supabaseClient
      .from("notifications")
      .select("*")
      .eq("hotel_id", currentHotelId)
      .order("created_at", {
        ascending: false
      });

  // الحجوزات
  const { data: bookings } =
    await supabaseClient
      .from("bookings")
      .select("*")
      .eq("hotel_id", currentHotelId)
      .order("created_at", {
        ascending: false
      });

  // الرسائل
  const { data: messages } =
    await supabaseClient
      .from("hotel_messages")
      .select("*")
      .eq("hotel_id", currentHotelId)
      .order("created_at", {
        ascending: false
      });

  let notifications = [];

  // إشعارات الحجوزات
  (bookings || []).forEach(b => {

    notifications.push({

      type: "booking",

      text:
        `📋 حجز جديد من ${b.user_name || "عميل"}`,

      date:
        b.created_at

    });

  });

  // إشعارات الرسائل
  (messages || []).forEach(m => {

    if (m.sender_type !== "hotel") {

      notifications.push({

        type: "message",

        text:
          `💬 رسالة جديدة من ${m.sender_name || "عميل"}`,

        date:
          m.created_at

      });

    }

  });

  // إشعارات جدول notifications
  (dbNotifications || []).forEach(n => {

    notifications.push({

      type: "notification",

      text:
        n.message || "إشعار جديد",

      date:
        n.created_at

    });

  });

  // ترتيب
  notifications.sort(
    (a, b) =>
      new Date(b.date) -
      new Date(a.date)
  );

  // العدد
  const notifCount =
    document.getElementById("notifCount");

  if (notifications.length > 0) {

    notifCount.style.display =
      "inline-block";

    notifCount.innerText =
      notifications.length;

  } else {

    notifCount.style.display =
      "none";

  }

  // عرض الإشعارات
  const box =
    document.getElementById(
      "notificationsContainer"
    );

  box.innerHTML = "";

  if (!notifications.length) {

    box.innerHTML =
      "<p>لا توجد إشعارات</p>";

    return;

  }

  notifications.forEach(n => {

    const div =
      document.createElement("div");

    div.className = "card";

    div.innerHTML = `
      <p>${n.text}</p>

      <small>
        ${new Date(
          n.date
        ).toLocaleString()}
      </small>
    `;

    box.appendChild(div);

  });

}

async function loadWallet() {

  const { data, error } =
    await supabaseClient
      .from("bookings")
      .select("*")
      .eq("hotel_id", currentHotelId);

  if (error) {
    showMsg(error.message);
    return;
  }

  let electronicTotal = 0;
  let hotelTotal = 0;

  (data || []).forEach(b => {

    const amount =
      Number(b.total_price || 0) * 0.95;

    if (
      b.payment_method === "paymob"
    ) {

      electronicTotal += amount;

    }

    if (
      b.payment_method === "hotel"
    ) {

      hotelTotal += amount;

    }

  });

  document.getElementById(
    "electronicAmount"
  ).innerText =
    electronicTotal.toLocaleString() +
    " جنيه";

  document.getElementById(
    "hotelAmount"
  ).innerText =
    hotelTotal.toLocaleString() +
    " جنيه";

}

<script>
document.addEventListener("DOMContentLoaded", () => {
  const btn = document.getElementById("withdrawBtn");

    console.error("❌ زر withdrawBtn مش موجود");
    return;
  }
  console.log("✅ زر السحب جاهز");

  btn.addEventListener("click", async () => {
    try {

      const amount = parseFloat(document.getElementById("amount")?.value);
      const paypal_email = document.getElementById("paypal_email")?.value?.trim();

      console.log("DATA:", { amount, paypal_email, hotel_id });

      // ===== VALIDATION =====
      if (!amount || amount <= 0) {
        alert("أدخل مبلغ صحيح");

        method: "POST",
        headers: { "Content-Type": "application/json" },

});
