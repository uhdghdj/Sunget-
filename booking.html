
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صفحة الحجز</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* نفس الـ CSS اللي عندك - كامل ومُحسَّن */
:root {
  --bg: #0b0b0f;
  --bg-2: #14141c;
  --surface: #1a1a24;
  --surface-2: #20202c;
  --text: #ffffff;
  --text-muted: #b8b8c4;
  --border: rgba(255, 255, 255, 0.08);
  --accent: #ffb400;
  --accent-2: #ff7a00;
  --danger: #e63946;
  --success: #27b82e;
  --shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
  --radius: 14px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Cairo", sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 30px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
}

h1 {
  font-weight: 800;
  text-align: center;
  font-size: clamp(26px, 4.5vw, 42px);
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin-bottom: 2rem;
}

.booking-container {
  width: 100%;
  max-width: 720px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: clamp(24px, 4vw, 36px);
}

#hotelName {
  text-align: center;
  font-size: clamp(16px, 2.2vw, 20px);
  font-weight: 700;
  color: var(--accent);
  padding: 12px 20px;
  margin-bottom: 24px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 30px;
  display: inline-block;
}

form {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

label {
  font-weight: 700;
  color: var(--text);
  font-size: 14px;
  margin-bottom: 6px;
}

input, select {
  width: 100%;
  padding: 16px 18px;
  font-family: inherit;
  font-size: 15px;
  color: var(--text);
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 12px;
  outline: none;
  transition: all 0.3s ease;
}

input:focus, select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(255, 180, 0, 0.2);
}

#totalPrice {
  text-align: center;
  font-size: clamp(20px, 3vw, 28px);
  font-weight: 800;
  padding: 20px;
  margin: 20px 0;
  background: linear-gradient(135deg, rgba(255, 180, 0, 0.1), rgba(255, 122, 0, 0.1));
  border: 2px solid var(--accent);
  border-radius: var(--radius);
  color: var(--accent);
}

#confirmBooking {
  width: 100%;
  padding: 20px 24px;
  font-family: inherit;
  font-size: 16px;
  font-weight: 800;
  color: #000;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  border: none;
  border-radius: 30px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.3s ease;
  text-transform: uppercase;
}

#confirmBooking:hover {
  transform: translateY(-3px);
  box-shadow: 0 15px 35px rgba(255, 180, 0, 0.4);
}

#confirmBooking:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

.loading {
  position: relative;
  color: transparent;
}

.loading::after {
  content: '⏳ جارٍ الحجز...';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.error {
  padding: 15px;
  background: rgba(230, 57, 70, 0.15);
  border: 1px solid var(--danger);
  border-radius: 10px;
  color: var(--danger);
  text-align: center;
  font-weight: 600;
}
/* ================== GOOGLE TRANSLATE - COMPLETE HIDE ================== */
#google_translate_element,
.goog-te-banner-frame,
.goog-te-menu-frame,
.goog-te-balloon-frame,
.goog-te-gadget,
.goog-logo-link,
.goog-te-gadget span,
.skiptranslate,
.goog-te-combo,
.VIpgJd-ZVi9od-ORHb-OEVmkb svg,
[aria-label*="Google"],
[title*="Google"] {
  display: none !important;
  visibility: hidden !important;
  opacity: 0 !important;
  height: 0 !important;
  width: 0 !important;
  overflow: hidden !important;
  position: absolute !important;
  z-index: -9999 !important;
}
.success {
  padding: 15px;
  background: rgba(39, 184, 46, 0.15);
  border: 1px solid var(--success);
  border-radius: 10px;
  color: var(--success);
  text-align: center;
  font-weight: 600;
}

@media (max-width: 600px) {
  body { padding: 20px 12px; }
  .booking-container { padding: 20px 16px; }
}
</style>
</head>
<body>
  <h1>احجز غرفتك الآن</h1>

  <div class="booking-container">
    <h3 id="hotelName">جارٍ تحميل اسم الفندق...</h3>
    
    <form id="bookingForm">
      <label>اختر الغرفة</label>
      <select id="roomSelect" required>
        <option value="">تحميل الغرف...</option>
      </select>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
        <div>
          <label>تاريخ الوصول</label>
          <input type="date" id="checkIn" required>

        </div>
        <div>
          <label>تاريخ المغادرة</label>
         <input type="date" id="checkOut" required>
        </div>
      </div>

      <label>طريقة الدفع</label>
      <select id="paymentMethod">
        <option value="paymob">💳 دفع أونلاين (Paymob)</option>
        <option value="hotel">🏨 الدفع في الفندق</option>
      </select>

      <div id="totalPrice">السعر الإجمالي: 0 جنيه</div>

      <button type="submit" id="confirmBooking">تأكيد الحجز والدفع</button>
    </form>

    <div id="message"></div>
  </div>

  <script>
    /* =========================
       SUPABASE INIT
    ========================= */
    const supabaseClient = supabase.createClient(
      "https://mqvmxqzwvpasdytbpbke.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xdm14cXp3dnBhc2R5dGJwYmtlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjIyODMwMjksImV4cCI6MjA3Nzg1OTAyOX0.jHrxC0IcuWYkSaB2y-guc5tl5dPPWFSoasv3rmjcxuM"
    );

    /* =========================
       GLOBAL VARIABLES
    ========================= */
    let hotelId = null;
    let hotelData = null;
    let roomsArray = [];
    let roomPrices = {};
    let selectedRoomId = null;

    /* =========================
       GET HOTEL ID FROM URL
    ========================= */
    const params = new URLSearchParams(window.location.search);
    hotelId = params.get("id");

    /* =========================
       UTILITY FUNCTIONS
    ========================= */
    function showMessage(text, type = 'info') {
      const messageDiv = document.getElementById('message');
      messageDiv.innerHTML = `<div class="${type}">${text}</div>`;
      
      if (type !== 'error') {
        setTimeout(() => {
          messageDiv.innerHTML = '';
        }, 5000);
      }
    }

    function disableButton(button, loadingText = 'جارٍ العمل...') {
      button.disabled = true;
      button.classList.add('loading');
      button.textContent = loadingText;
    }

    function enableButton(button, originalText) {
      button.disabled = false;
      button.classList.remove('loading');
      button.textContent = originalText;
    }

    /* =========================
       CALCULATE TOTAL PRICE
    ========================= */
    function calculateTotal() {
      const checkIn = document.getElementById("checkIn").value;
      const checkOut = document.getElementById("checkOut").value;

      if (!checkIn || !checkOut || !selectedRoomId) {
        document.getElementById("totalPrice").textContent = "السعر الإجمالي: 0 جنيه";
        return 0;
      }

      const start = new Date(checkIn + 'T00:00:00');
      const end = new Date(checkOut + 'T00:00:00');

      const nights = Math.ceil((end - start) / (1000 * 60 * 60 * 24));

      if (nights <= 0) {
        document.getElementById("totalPrice").textContent = "السعر الإجمالي: 0 جنيه";
        return 0;
      }

      const price = Number(roomPrices[selectedRoomId] || 0);
      const total = price * nights;

      document.getElementById("totalPrice").textContent = 
        `السعر الإجمالي: ${total.toLocaleString()} جنيه (${nights} ليلة)`;

      return total;
    }

    /* =========================
       LOAD HOTEL + ROOMS
    ========================= */
    async function loadHotel() {
      try {
        if (!hotelId) {
          showMessage('❌ لم يتم تحديد الفندق', 'error');
          return;
        }

        showMessage('جارٍ تحميل بيانات الفندق...', 'info');

        // تحميل بيانات الفندق
        const { data: hotel, error: hotelError } = await supabaseClient
          .from("hotels")
          .select("*")
          .eq("id", hotelId)
          .single();

        if (hotelError || !hotel) {
          showMessage('❌ الفندق غير موجود', 'error');
          return;
        }

        hotelData = hotel;
        document.getElementById("hotelName").textContent = hotel.hotel_name;

        // تحميل الغرف
        const { data: rooms, error: roomsError } = await supabaseClient
          .from("rooms")
          .select("*")
          .eq("hotel_id", hotelId)
          .order('room_type');

        if (roomsError || !rooms?.length) {
          showMessage('❌ لا توجد غرف متاحة لهذا الفندق', 'error');
          return;
        }

        roomsArray = rooms;
        const roomSelect = document.getElementById("roomSelect");
        roomSelect.innerHTML = '<option value="">اختر غرفة...</option>';

        roomPrices = {};
        rooms.forEach(room => {
          const option = document.createElement("option");
          option.value = room.id;
          option.textContent = `${room.room_type} - ${room.room_number || 'غير محدد'} (${room.price || room.base_price || 0} جنيه/ليلة)`;
          roomPrices[room.id] = Number(room.price || room.base_price || 0);
          roomSelect.appendChild(option);
        });

        selectedRoomId = null;
        roomSelect.addEventListener("change", (e) => {
          selectedRoomId = e.target.value;
          calculateTotal();
        });

        // Event Listeners للتواريخ
        document.getElementById("checkIn").addEventListener("change", calculateTotal);
        document.getElementById("checkOut").addEventListener("change", calculateTotal);

        showMessage(`✅ تم تحميل ${rooms.length} غرفة بنجاح`, 'success');
        calculateTotal();

      } catch (error) {
        console.error('Load Hotel Error:', error);
        showMessage('❌ حدث خطأ في تحميل الصفحة', 'error');
      }
    }

    /* =========================
       CONFIRM BOOKING
    ========================= */
    document.getElementById("bookingForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const checkIn = document.getElementById("checkIn").value;
      const checkOut = document.getElementById("checkOut").value;
      const paymentMethod = document.getElementById("paymentMethod").value;

      // Validation
      if (!checkIn || !checkOut) {
        showMessage('❌ اختر تواريخ الوصول والمغادرة', 'error');
        return;
      }

      if (!selectedRoomId) {
        showMessage('❌ اختر غرفة من القائمة', 'error');
        return;
      }

      const total = calculateTotal();
      if (total <= 0) {
        showMessage('❌ السعر غير صحيح', 'error');
        return;
      }

      const confirmBtn = document.getElementById("confirmBooking");
      const originalText = confirmBtn.textContent;
      
      disableButton(confirmBtn);

      try {
        // فحص تسجيل الدخول
        const { data: userData, error: authError } = await supabaseClient.auth.getUser();
        
        if (authError || !userData?.user) {
          showMessage('❌ يجب تسجيل الدخول أولاً', 'error');
          enableButton(confirmBtn, originalText);
          return;
        }

     const { data: booking, error: bookingError } = await supabaseClient
  .from("bookings")
  .insert([{
    hotel_name: hotelData.hotel_name,
    user_id: userData.user.id,
    hotel_id: hotelId,
    room_id: selectedRoomId,
    check_in: checkIn,
    check_out: checkOut,
    status: "pending",
    total_price: total,

    // طريقة الدفع
   payment_method:
  paymentMethod === "paymob"
    ? "paymob"
    : "hotel"
  }])
  .select()
  .single();

if (bookingError) {
  console.log(bookingError);
  return alert("خطأ في الحجز");
}
// ✅ تحديد المبلغ المطلوب دفعه

let amountToPay = 0;
let remaining = 0;

// لو الدفع أونلاين → يدفع المبلغ كامل
if (paymentMethod === "hotel") {

  amountToPay = total;

  remaining = 0;

}

// لو الدفع في الفندق → يدفع 5% فقط
else {

  amountToPay = Math.round(total * 0.05);

  remaining = total - amountToPay;

}

// ✅ حفظ البيانات
const bookingData = {

  bookingId: booking.id,
  hotel_name: hotelData.hotel_name,

  hotelId: hotelId,

  roomId: selectedRoomId,

  checkIn: checkIn,

  checkOut: checkOut,

  total: total,

  amountToPay: amountToPay,

  remaining: remaining

};

// ✅ تأكد إن البيانات اتخزنت
console.log("BOOKING DATA:", bookingData);

localStorage.setItem(
  "bookingData",
  JSON.stringify(bookingData)
);
// ✅ لو الدفع أونلاين → يدفع كامل المبلغ
if (paymentMethod === 'paymob') {

  bookingData.amountToPay = total;
  bookingData.remaining = 0;

}

// ✅ لو الدفع في الفندق → يدفع 5% فقط
else {

  bookingData.amountToPay = Math.round(total * 0.05);
  bookingData.remaining = total - bookingData.amountToPay;

}

// تحديث localStorage
localStorage.setItem(
  "bookingData",
  JSON.stringify(bookingData)
);

// رسالة نجاح
showMessage(`
  ✅ تم إنشاء الحجز بنجاح
  <br>
  ${paymentMethod === 'paymob'
    ? '💳 سيتم تحويلك للدفع الإلكتروني'
    : '🏨 سيتم دفع العربون الآن والباقي في الفندق'}
`, 'success');

// ✅ في الحالتين يروح لصفحة Paymob
setTimeout(() => {

  window.location.href = "netlify/functions/paymob.html";

}, 2000);

      } catch (error) {
        console.error('Unexpected Error:', error);
        showMessage('❌ حدث خطأ غير متوقع', 'error');
      } finally {
        enableButton(confirmBtn, originalText);
      }
    });

    /* =========================
       INITIALIZE
    ========================= */
    document.addEventListener('DOMContentLoaded', () => {
      loadHotel();
      
      // تعيين تاريخ اليوم كحد أدنى
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('checkIn').min = today;
      document.getElementById('checkOut').min = today;
    });
  </script>
<script>
const checkInInput = document.getElementById("checkIn");
const checkOutInput = document.getElementById("checkOut");

let bookedRanges = [];

/* =========================
   تحميل الحجوزات للغرفة المختارة
========================= */
async function loadBookedDates(roomId) {

  if (!roomId) return;

  const { data, error } = await supabaseClient
    .from("bookings")
    .select("check_in, check_out")
    .eq("room_id", roomId)
    .neq("status", "cancelled");

  if (error) {
    console.log(error);
    return;
  }

  bookedRanges = data.map(b => ({
    start: new Date(b.check_in),
    end: new Date(b.check_out)
  }));

  console.log("BOOKED:", bookedRanges);
}

/* =========================
   هل الفترة محجوزة؟
========================= */
function isRangeBooked(startDate, endDate) {

  return bookedRanges.some(range => {

    return (
      startDate < range.end &&
      endDate > range.start
    );

  });

}

/* =========================
   فحص التواريخ
========================= */
function validateBookingDates() {

  const checkInValue = checkInInput.value;
  const checkOutValue = checkOutInput.value;

  if (!checkInValue || !checkOutValue) return;

  const start = new Date(checkInValue);
  const end = new Date(checkOutValue);

  // منع المغادرة قبل الوصول
  if (end <= start) {

    showMessage(
      "❌ تاريخ المغادرة يجب أن يكون بعد الوصول",
      "error"
    );

    checkOutInput.value = "";

    return;
  }

  // منع الحجز لو متداخل
  if (isRangeBooked(start, end)) {

    showMessage(
      "❌ هذه الفترة محجوزة بالفعل",
      "error"
    );

    checkInInput.value = "";
    checkOutInput.value = "";

    return;
  }

}

/* =========================
   عند اختيار غرفة
========================= */
document
  .getElementById("roomSelect")
  .addEventListener("change", async (e) => {

    selectedRoomId = e.target.value;

    await loadBookedDates(selectedRoomId);

    calculateTotal();

});

/* =========================
   فحص عند تغيير التاريخ
========================= */
checkInInput.addEventListener(
  "change",
  validateBookingDates
);

checkOutInput.addEventListener(
  "change",
  validateBookingDates
);
</script>
  <script src="translate.js"></script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
